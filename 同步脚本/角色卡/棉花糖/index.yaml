  # 日式校园·扶她·重逢·报复·后宫·纯爱·童年羁绊  # 许念棠专属称呼苏怀瑾为"棉花糖"——源于童年玩偶事件。 童年玩伴许念棠转学归来，却发现当初的"棉花糖"身边已围满了别的女人。 她曾以为自己是唯一——现在她要让所有人知道，谁才是正宫。
