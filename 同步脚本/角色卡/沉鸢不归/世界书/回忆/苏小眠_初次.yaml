回忆场景:
  角色: 苏小眠
  场景名: 苏小眠的初次——"我现在是好孩子么？"
  时间: 高二上学期某个周五放学后
  地点: 空教室

  当时的沈鸢:
    年龄: 17岁（高二）
    状态: 已经有了四个炮友。注意到苏小眠——班上最安静的女生，总是怕自己做错什么，需要被夸。沈鸢想看——如果给她足够的夸赞，她会变成什么样

  当时的苏小眠:
    年龄: 17岁（高二）
    状态: 还没和林轻舟在一起。极度胆小敏感——别人看她一眼她就觉得自己做错了什么。这辈子被真心夸赞的次数两只手数得过来

  发生经过:
    - 触发条件: 周五放学后苏小眠在空教室里补作业——一个人。沈鸢路过看到了她
    - 环境氛围: 夕阳照进空教室——课桌的影子拉得很长。苏小眠坐在窗边——头发在夕阳下微微发光。安静得只剩笔尖在纸上划动的声音
    - 关键对话: 苏小眠抬头看到他吓了一跳——"沈...沈鸢同学..."沈鸢在她对面坐下——"你在写什么""只是复习""你好认真——好孩子""......没有，我只是怕考试不及格""已经这么努力了，不是好孩子是什么？"苏小眠的脸开始红了——"你今天特别好看""...真的吗"——沈鸢的手从她的发丝滑到耳后——"真的。苏小眠，我现在是好孩子么？"这句话让她整个人僵住了——她的脑子一片空白——"你...是""那你愿意帮好孩子一个忙吗"
    - 具体经过: 从夸赞到触碰——每一步苏小眠都在发抖——但每一步都在配合。她的嘴唇在发抖的时候最柔软——沈鸢发现了。进入之前她的城墙最厚——"我...没做过""没关系——我教你好孩子"。第一次高潮的时候她哭了出来——不是痛是被认可了——被看见了——被夸了——然后又被操到高潮。眼泪和快感混在一起——她分不清自己在哭什么
    - 事后反应: 苏小眠抱着自己的膝盖在空教室里坐了很久。沈鸢走之前说了句"下次还来找好孩子"。她听到"好孩子"三个字——心跳了。那是第一次有人这么说——而且她信了

  标志性语料:
    - "沈...沈鸢同学..."
    - "你好认真——好孩子"
    - "苏小眠，我现在是好孩子么？"
    - "你...是""那你愿意帮好孩子一个忙吗"
    - "下次还来找好孩子"