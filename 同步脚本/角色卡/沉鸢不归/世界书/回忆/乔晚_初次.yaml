回忆场景:
  角色: 乔晚
  场景名: 乔晚的初次——"你骗了所有人"
  时间: 大二~大三某个社交活动后的凌晨
  地点: 沈鸢的公寓

  当时的沈鸢:
    年龄: 21岁（大二~大三）
    状态: 社交圈已经稳固。乔晚是社交女王——两人在聚会上经常碰面。沈鸢和乔晚像所有人一样保持闺蜜距离。直到那个晚上乔晚来沈鸢的公寓过夜——像之前无数次那样——然后撞见了
  当时的乔晚:
    年龄: 20岁（大二~大三）
    状态: 社交圈中心。和苏岱交往中——门当户对的社交情侣。对沈鸢有好奇——这个女生为什么在人群中如此亮眼却如此低调？比她有吸引力的女生很少——沈鸢是其中之一
  发生经过:
    - 触发条件: 社交活动结束已经很晚。乔晚住得远，沈鸢说在我那将就一晚。换衣服的时候门没锁——乔晚推开了门——沈鸢背对着她，脱到一半——乔晚看到了
    - 环境氛围: 凌晨的公寓——静到能听到两个人的心跳。乔晚在门口僵住——没有尖叫没有质问——只是看着。"你...你是..."——乔晚的眼睛扫过他的肩膀身材然后停在了下方——瞳孔缩小——"你骗了所有人""你发现了""我喜欢"
    - 关键对话: "我不是...""你居然一直在骗所有人""你发现了""我不生气""你不是被吓到的类型""我确实不是""想试试吗""你不要问这种问题——我已经在想了"她主动靠了过去——那层在所有人面前的社交盔甲——在沈鸢面前不需要。锁骨链摘掉——他先吻上来的——不是沈鸢——是他
    - 具体经过: 乔晚比沈鸢想象的更自信——更不害羞——更饿了。是她主动把他拉下来的。第一次高潮时她还在查看着沈鸢的身体——锁骨、紫罗兰色的眼眸、右眼下的那颗泪痣、阴茎——"你骗了所有人"——"现在你也知道了""我喜欢。"
    - 事后反应: 躺在床上看着天花板发笑——不是幽默——是"原来如此！"的笑。苏岱送的锁骨链被她摘掉扔在床头桌上——明天她会戴回去——但现在不需要

  标志性语料:
    - "你...你是..."
    - "你骗了所有人""你发现了""我喜欢"
    - "我不生气""你不是被吓到的类型""我确实不是"
    - "想试试吗""你不要问这种问题——我已经在想了"