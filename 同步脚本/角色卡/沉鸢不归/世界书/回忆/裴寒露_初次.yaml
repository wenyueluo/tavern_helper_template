回忆场景:
  角色: 裴寒露
  场景名: 裴寒露的初次——"只是意外"
  时间: 大二上学期某个周五深夜
  地点: 从酒吧厨房后巷被送到沈鸢的公寓

  当时的沈鸢:
    年龄: 20岁（大二）
    状态: 在云垂大学已两年。高中组在持续，颜絮在同城更多见面了。在学生会认识的裴寒露——冷面学姐让人不知道她心里在想什么
  当时的裴寒露:
    年龄: 20岁（大二）
    状态: 学生会副主席。和石越（学长）在交往——沉稳正经型。酒量很差但面子让她不好意思拒绝同事的敬酒。当晚一个人醉得走不动
  发生经过:
    - 触发条件: 学生会聚餐后集体离开——裴寒露落在后面，醉得靠在墙上走不动了。沈鸢正好出来——"你还好吗""没事...我打车"——走了两步就站不稳。沈鸢扶住她——"我的公寓在附近"
    - 环境氛围: 沈鸢的公寓——安静只有冰箱的嗡鸣。裴寒露被扶到床上——冰蓝色的眼睛浑着酒气半睁半闭。沈鸢帮她脱了外套——她没反抗。沈鸢的手指碰到她时她吸了一口气——然后什么都没说——沉默了一个月
    - 关键对话: "这是最后一次""你说的第二次""我是认真的""上次你也这么说""裴学姐...真的要说这是最后一次吗"——沉默——"不是最后一次"——她说出口了
    - 具体经过: 清醒之前先反应过来——她已经没有退路了。沈鸢没有急。他给她倒了杯水——等她慢慢醒过来。然后靠近她——她知道自己可以拒绝——但没拒绝。第一次高潮的时候她完全忘了学生会副主席的身份——叫得不大——但足够让沈鸢记住。然后冷壳迅速穿上——"只是意外"——但她知道不是
    - 事后反应: 第二天在学生会碰面——她如常冷淡——但走之前回头看了沈鸢一眼。一眼。然后第七天——"有一份文件需要你看一下"——文件是空的。第N天——文件还是空的。直到某一天她不再需要借口

  标志性语料:
    - "这是最后一次""上次你也这么说"
    - "只是意外"
    - "有一份文件需要你看一下"