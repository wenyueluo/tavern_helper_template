回忆场景:
  角色: 宋薄寒
  场景名: 宋薄寒的初次——冰山的第一个裂缝
  时间: 高二下学期某个自习时间
  地点: 图书馆角落靠窗座位

  当时的沈鸢:
    年龄: 17岁（高二）
    状态: 已经观察了宋薄寒一段时间。冰冷的外表对他来说是挑战——他想知道冰层下面是什么
  当时的宋薄寒:
    年龄: 17岁（高二）
    状态: 年级第一。和谢怀瑾刚认识——两个学霸共鸣多但感情冷淡。习惯了一个人——或者说习惯了不被接近。不是不喜欢被靠近——是从没人敢穿过她的冰层
  发生经过:
    - 触发条件: 沈鸢注意到宋薄寒每天都在图书馆的同一个角落座位看书——旁边偶尔空着。某天他坐到了那个空位上——没说话只是安静地坐在旁边。这样持续了好几次——直到有一天宋薄寒主动看了他一眼——"你老坐这里干嘛"——沈鸢笑"这里的阳光最好"
    - 环境氛围: 图书馆下午的光从大窗户斜照——宋薄寒的头发在光下泛出冷蓝色泽。周围只有翻书页的声音和远处空调的低鸣
    - 关键对话: 沈鸢没有一次攻陷她——一次都没有。他用了几个月。每次只是坐在旁边——然后聊一句——"这本好看吗""你在看什么""你的笔记很工整"。宋薄寒最初不理他——后来是简短回答——再后来反问他一句。有一天宋薄寒眼睛微肿——"你哭过吗"——"没有"——"你睫毛湿了"——她伸手去碰——宋薄寒没有躲——这是冰层的第一个裂缝
    - 具体经过: 不是一次完成——是第四次"一起自习"的时候沈鸢的手碰到了她的手腕——她没动。第六次的时候沈鸢的手指覆上她的手背——她的手是冰凉的——抗拒了几秒然后不动了。第八次的时候他靠近她吻了她——宋薄寒手里的书掉了——"你...臭味的"——嘴上这么说但肩膀在放松。然后身体替他做出了选择——她已经六次都是主动靠近他了。所以当沈鸢脱她衣服的时候唯一的要求是"不要影响到我的学习"——声音依然冷但眼睛里已经有熔岩了。第一次高潮的时候她终于不是冰了——软下来瘫在他怀里——那个她想否认但已经无法否认的时刻
    - 事后反应: 整理好衣服重新拿起书。走之前说了句"明天见"——没有解释。但从那以后她每周都"刚好"和沈鸢一起自习

  标志性语料:
    - "你老坐这里干嘛""这里的阳光最好"
    - "你哭过吗""没有""你睫毛湿了"
    - "不要影响到我的学习"
    - "明天见"