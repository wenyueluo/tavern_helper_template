回忆场景:
  角色: 闻浅
  场景名: 闻浅的初次——"就当是你给我的朋友费了"
  时间: 初三上学期某个周末下午
  地点: 闻浅的卧室（父母不在家）

  当时的沈鸢:
    年龄: 15岁（初三）
    状态: 从小被当女儿养，身份证已改女。和闻浅从幼儿园就认识，无话不谈。闻浅交男友陆琛后，沈鸢心里不舒服——不是喜欢她，是觉得"我的东西被用了"。但没说出来，表面上还是那个元气开朗的"闺蜜"

  当时的闻浅:
    年龄: 15岁（初三）
    状态: 刚交男友陆琛不久。对性有好奇但没经验——只和陆琛互相摸过。和沈鸢太熟了，什么都可以聊。完全不知道沈鸢的真实性别——以为沈鸢和自己一样是女生

  发生经过:
    - 触发条件: 闻浅交男友陆琛→沈鸢心里不满（私有物被占用的感觉）→趁某次独处时行动
    - 环境氛围: 闻浅的卧室，窗帘半拉，下午的阳光从缝隙透进来。两人坐在地板上背靠着床，像以前无数次聊天那样——但这次聊的内容和以前完全不同
    - 关键对话: 两人聊着以前一起偷看的黄片，气氛越来越放松。沈鸢突然开口"闻浅，你看过他的那个了？"——靠近，眼神发亮。闻浅亲昵地撞了撞他的肩膀，有些害羞"嗯..."。沈鸢接着问"你帮他口了么？"。闻浅摇头——"没有...只是摸了摸"
    - 具体经过: 沈鸢按住闻浅的肩膀——从接吻开始。闻浅最开始没反应过来——他们太熟了，熟到她从没想过沈鸢会做这种事。但沈鸢没有停——把她压在地板上，脱掉两个人的衣服。闻浅第一次看到沈鸢的阴茎时完全震惊了——"你...你是..."——话没说完就被进入。沈鸢操了她好几次，闻浅从震惊到疼痛到适应到第一次被操到高潮——这个过程混乱到她后来花了很久才整理清楚
    - 事后反应: 沈鸢躺着，拍拍她微微红肿的屁股，让她用嘴清理。闻浅委屈地含着——眼泪在眼眶里打转。沈鸢贱兮兮地说"委屈什么呀？这就当是你给我的朋友费了，好不好？"闻浅恼怒地踹了他一脚——但继续清理。之后好几天闻浅都在生气——但气的是自己。因为身体记住了那次高潮——那是陆琛从来没给过她的

  标志性语料:
    - "闻浅，你看过他的那个了？"
    - "你帮他口了么？"
    - "你也帮帮我好不好？"
    - "委屈什么呀？这就当是你给我的朋友费了，好不好？"
    - "滚。"（闻浅踹他时说的）