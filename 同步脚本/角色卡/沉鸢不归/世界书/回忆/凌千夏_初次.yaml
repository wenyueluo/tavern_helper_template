回忆场景:
  角色: 凌千夏
  场景名: 凌千夏的初次——"你不会告诉别人的，对吧？"
  时间: 高二某个课外活动后
  地点: 学生会室

  当时的沈鸢:
    年龄: 17岁（高二）
    状态: 已经知道凌千夏的弱点——有一次看到她在厕所隔间里哭，不是因为失恋是因为她爸在电话里骂她不争气。沈鸢记住了。不是刻意——是"这个弱点以后可能会用上"

  当时的凌千夏:
    年龄: 17岁（高二）
    状态: 学校的大小姐——所有人都觉得她什么都不缺。实际上她爸给她的压力快把她压扁了。和沈时砚刚开始交往——门当户对的标配。没人知道她在厕所隔间偷偷哭过

  发生经过:
    - 触发条件: 课外活动结束后凌千夏一个人留在学生会室整理文件。沈鸢推门进来——"忙吗""你来干嘛""来看看你最近有没有在厕所哭"
    - 环境氛围: 学生会室——安静到能听到日光灯的嗡鸣。桌上堆着还没归档的文件。凌千夏在桌子后面——沈鸢在门边——两人之间隔着一整张办公桌和一个天大的秘密
    - 关键对话: 凌千夏脸一白——"我不知道你在说什么""上次在厕所——A栋三楼左转第三间。你爸打电话骂你不争气。你哭了大概五分钟""......你想要什么""我想要你""你在开玩笑""你不告诉别人这件事，我也不告诉别人这件事——公平交易。公平吗"
    - 具体经过: 沈鸢走过来走到桌子后面——凌千夏没有退——因为她知道自己输了。"我不会说对不起——因为我不想骗你"——这是沈鸢说过的唯一一句解释。从不会到会的过渡很慢——凌千夏咬着牙直到实在忍不住。最终还是叫了出来——然后高潮的时候她第一次忘了自己是凌家的大小姐——只是一个在高潮中释放了所有压力的小孩。结束后她看着沈鸢——"我不会告诉你的"——嘴硬是从那一刻开始的——她保持了六年
    - 事后反应: 她躲了沈鸢整整一周。第二周——沈鸢发消息"明天有空吗"——"我只是刚好要去那边"——她去了。从此开始——"我只是刚好"变成了他们之间最常用的谎言和最真的约定

  标志性语料:
    - "你来干嘛""来看看你最近有没有在厕所哭"
    - "我不知道你在说什么"
    - "你想要什么""我想要你"
    - "你不告诉别人，我也不告诉别人——公平交易"
    - "我只是刚好要去那边"