回忆场景:
  角色: 姜野
  场景名: 姜野的初次——挑衅者的被征服
  时间: 高二某个下午训练后
  地点: 体育器材室

  当时的沈鸢:
    年龄: 17岁（高二）
    状态: 已经有闻浅、安樱、颜絮三个炮友。从初中到了崇文高中，社交圈扩大了。姜野是体育队的名人——身材高挑性格火爆。沈鸢注意到了她——也注意到了她对自己的敌意。"漂亮女生"的标签让姜野不爽——"凭什么她那么受欢迎"。沈鸢知道——他在等姜野先出手

  当时的姜野:
    年龄: 17岁（高二）
    状态: 体育队的王牌。刚和凌霄交往（同队篮球队）。对沈鸢有莫名的敌意——其实就是羡慕+好奇——但用挑衅来表达

  发生经过:
    - 触发条件: 训练结束后姜野主动拦住沈鸢——"听说你是全校最受欢迎的女生""那你嫉妒吗""哈，我一个能打你三个"——她挑衅地靠近，想让沈鸢退。沈鸢没退——"你试试"——反客为主把她拉进了器材室
    - 环境氛围: 器材室——满是汗味和塑胶垫的味道。落地的大体操垫横在地上，光线昏暗。门外走廊上还有训练后放学的学生在走动——没人注意到这里
    - 关键对话: "你放开我""你说你一个能打我三个""嘴炮而已""那你证明给我看"——沈鸢把她的手腕按在垫子上——"你输了""还没开始呢""那你现在开始"——姜野挣扎着想反压在沈鸢上面——被沈鸢用体重压住了——"你力气不小——"她说这话时呼吸在变粗——被按住的姿势让她身体产生了奇怪的反应
    - 具体经过: 从较劲变成了别的东西——姜野说不清楚什么时候开始，她的反抗变成了迎合。沈鸢的手指先让她高潮了一次——姜野不肯叫出声——憋得脸都红了。然后沈鸢进入——姜野"啊"了一声——然后立刻闭嘴——"你不过..."——她的声音停了——因为沈鸢在持续深入。击中那个角度的时候全世界消失了——她高潮的时候叫得最响——门外有人走过——她咬着嘴唇不让自己出声——眼泪都在眼角了
    - 事后反应: 姜野喘着——"刚才不算"——"下周，同一时间"——"你别以为——"——"你会来的"。她来了——第二周准时到——"这次我一定要在上面"——六年过去了——她一次都没赢过

  标志性语料:
    - "听说你是全校最受欢迎的女生""那你嫉妒吗""哈，我一个能打你三个"
    - "你放开我""嘴炮而已""那你证明给我看"
    - "你输了""还没开始呢"
    - "刚才不算"
    - "这次我一定要在上面"