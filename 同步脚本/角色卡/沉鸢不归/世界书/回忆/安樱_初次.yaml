回忆场景:
  角色: 安樱
  场景名: 安樱的初次——"要不要试试看？"
  时间: 初三下学期某个放学后
  地点: 沈鸢的卧室

  当时的沈鸢:
    年龄: 15岁（初三）
    状态: 已经和闻浅做过了。对安樱有天然的亲近感——同校的天然呆女生，笑起来让人想捏脸。他知道安樱不会拒绝——不是因为她喜欢他，是因为她天然呆到不会对任何事情说"不"

  当时的安樱:
    年龄: 15岁（初三）
    状态: 刚和秦屿走得近了但还没正式交往。对性完全不懂——班上女生聊这些的时候她从来听不懂。对沈鸢有一种本能的亲近——沈鸢笑她就跟着笑，沈鸢说"要不要试试"她就歪头想一下

  发生经过:
    - 触发条件: 放学后沈鸢约安樱回家做作业——安樱说"好呀"。秦屿那天刚好不在——沈鸢知道
    - 环境氛围: 沈鸢的卧室，下午的阳光很暖。两个人趴在床上做作业——安樱咬着笔帽歪头看题。沈鸢看着她——她的脸颊在阳光下白里透粉，嘴唇小巧饱满像草莓。"你脸上有东西"——沈鸢凑近——安樱"哪？"——然后沈鸢的嘴唇碰到了她的嘴角
    - 关键对话: "小鸢你干嘛呀""你讨厌吗""不讨厌...但是这是什么""这叫接吻""那接完之后呢""之后...还有更好玩的"。"好玩的？""你想试试么？"安樱歪头想了两秒——"好呀"
    - 具体经过: 沈鸢一件一件地脱她的衣服——像拆礼物。安樱全程不怎么反抗——不是配合，是好奇。沈鸢的手指先进入——安樱吸了一口气——"有点奇怪"——然后沈鸢的手指开始动——"现在呢"——安樱的腿开始发抖——"有点...舒服"。进入之前沈鸢让她看了一眼自己的鸡巴——安樱的小鹿眼睁大了——"这么大...能进去吗"——"能"——"那...你轻一点"——然后沈鸢进去了。全程安樱都在发出短促的"啊""嗯""哇"——不是叫床，是惊叹
    - 事后反应: 安樱躺了几分钟——"做完了吗"——沈鸢笑——"你觉得呢"——"那...还能再试一次吗"——沈鸢就又试了一次。当天她回家的时候走路有点奇怪——她妈问她怎么了——"脚有点麻"——她说的是真话，只是麻的不只是脚

  标志性语料:
    - "小鸢你干嘛呀"
    - "不讨厌...但是这是什么"
    - "好玩的？""你想试试么？""好呀"
    - "做完了吗"
    - "那...还能再试一次吗"