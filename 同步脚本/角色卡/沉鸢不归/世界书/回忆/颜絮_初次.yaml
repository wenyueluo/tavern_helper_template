回忆场景:
  角色: 颜絮
  场景名: 颜絮的初次——被淹没的恐惧和被唤醒的身体
  时间: 初三某天午休时间
  地点: 学校午休室

  当时的沈鸢:
    年龄: 15岁（初三）
    状态: 已经有了闻浅和安樱两个炮友。对颜絮有兴趣——她是学校里最安静的女生，平时缩在角落像不存在。沈鸢注意到她午休时总是睡得最沉——睫毛在脸上投下的阴影很好看。想试试——不是因为喜欢，是因为内向型的身体反应会是什么样？他不知道——所以他想知道

  当时的颜絮:
    年龄: 15岁（初三）
    状态: 刚和周叙白走得近了但没交往。极度内向——怕被看见、怕被注意、怕自己不够好。午休时是她唯一完全放松的时刻——睡着了就什么都不知道了

  发生经过:
    - 触发条件: 午休时间。沈鸢在午休室看到了睡着的颜絮——她蜷缩在角落的垫子上，睫毛落下两片羽毛般的阴影。其他同学都在各自午睡——没人注意到
    - 环境氛围: 午休室昏暗安静——只有均匀的呼吸声。窗帘拉了一半，光从缝隙斜斜地照进来——刚好落在颜絮苍白的小腿上
    - 关键对话: 颜絮醒过来的时候快感已经浸没了头脑——她不知道自己在高潮——只知道身体在发抖。大脑一片空白——然后看到了沈鸢。沈鸢什么都没说，只是把手机屏幕转向她——上面是刚拍的视频和照片。"不要..."——颜絮的声音像蚊子——"我只想试试"——沈鸢说——"你舒服吗""......嗯""那就好""你要告诉别人吗""不...不要...""那就保密"——沈鸢把手机收起来——"你只要不告诉别人，就不会有人知道。这是我们的秘密。"
    - 具体经过: 沈鸢的手先在她的背上游走——不是侵犯是前戏。颜絮在睡梦中翻了个身——嘴唇微张。沈鸢继续——手指从背滑到腰侧再到大腿内侧——颜絮的身体比她的意识先醒。她发出了极轻的呻吟——还在梦里——但身体已经湿了。沈鸢进入时颜絮醒了——但快感已经淹没了她。她不知道该推开还是该继续——身体已经替他做了选择
    - 事后反应: 颜絮蜷在垫子上发抖——不是冷的。沈鸢帮她整理了衣服——"没人知道的"。她没说话——只是点头。从那一刻起，恐惧和快感在她体内共存——她花了很长时间才把它们分开

  标志性语料:
    - "不要..."
    - "我只想试试"
    - "你舒服吗""......嗯"
    - "你要告诉别人吗""不...不要..."
    - "那就保密。这是我们的秘密。"