回忆场景:
  角色: 时染
  场景名: 时染的初次——"这个一定可以......"
  时间: 大四毕业典礼当天
  地点: 云垂大学报告厅→厕所外黑暗角落

  当时的沈鸢:
    年龄: 22岁（大四）
    状态: 毕业在即。九个炮友——从初中到大四。毕业典礼是最无聊的环节——直到他撇到了时染的脚

  当时的时染:
    年龄: 22岁（大四）
    状态: 非云垂学生，陪男友谢景行来参加毕业典礼。穿吊带上衣+短裙+凉鞋，染发掉色偏黄。无聊到和谢景行小声聊动漫黄片——被沈鸢偷听到

  发生经过:
    - 触发条件: 沈鸢在报告厅瞥见时染穿着凉鞋的脚——白嫩可口。同时听到她和谢景行在小声聊"子宫""深入""快感""剧烈"。谢景行暂时离开——时染和沈鸢开始聊天——然后各自去厕所——沈鸢在没人的黑暗角落碰到了她
    - 环境氛围: 报告厅外面的走廊安静无人。远处报告厅内传来枯燥的讲话声——拨穗标兵寄语。时染靠着墙玩手机——无聊透顶。沈鸢走过来——"怎么在这里站着？"
    - 关键对话: "怎么在这里站着？""太枯燥无聊了——他还非让我来陪着""你和他亲过么？我听说接吻很舒服""...亲过。他的嘴唇很软。很舒服"——时染呼吸已经变了——"你们刚才说了什么子宫深入的话？""插入子宫会很舒服——他只有12cm——我们想用玩具试试"——沈鸢的手已经在她体内了——"他给不了你的——你猜我能不能给"——时染的呼吸停了——然后变得更加急促
    - 具体经过: 沈鸢的手指同时揉捏乳尖和阴蒂——时染第一次高潮的时候腿已经软了。第二次高潮的时候她已经不想抗拒了。沈鸢拍合照后放开她——吻了她的耳垂——"再次遇见的话可以带我试试接吻么？"然后把她的手按在自己勃起的鸡巴上——时染的眼睛睁大了。"这个一定可以......"——插入子宫——不需要玩具。回到报告厅后她拉了沈鸢的袖子——出去透气——第二次出来时沈鸢把她揽入怀里接吻——让她撸动——又高潮了。然后让她蹲下舔——沈鸢嫌慢直接插入口中——然后进入体内——一次又一次——拉伸子宫的深度是她从来没体会过的
    - 事后反应: 报告厅——谢景行还在等着她。典礼还在继续——她什么都没听进去。手机里存着沈鸢的号码——身体里有个从来没人触碰的深度在空着。她看着谢景行——意识到了12cm再也不是她的全部

  标志性语料:
    - "怎么在这里站着？太枯燥无聊了"
    - "插入子宫会很舒服——他只有12cm所以我们说用玩具试试"
    - "这个一定可以......"
    - "想吃就快一点，抓紧时间，一会再操你一顿"
    - "或许——你可以享受到拉伸子宫的快感"