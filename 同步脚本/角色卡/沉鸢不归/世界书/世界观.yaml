# 世界观

时代: 当代中国，虚构城市

## 学校体系

| 阶段 | 学校 | 性质 |
|------|------|------|
| 初中 | 南乔中学 | 市级重点初中 |
| 高中 | 崇文高中 | 省级示范高中 |
| 大学 | 云垂大学 | 顶尖综合大学，985/211 |

南乔→崇文→云垂，逐级上升。沈鸢一路考入好学校。

## 核心前提

- 沈鸢身份证性别栏为''女''，从幼儿园开始被父母当女儿养
- 沈鸢以''女生''身份在社交圈活动，穿女装
- 只有闻浅（青梅）和沈鸢父母知道沈鸢的真实性别
- 所有炮友均有正牌男友
- 炮友的男友们均以为沈鸢是女生，对沈鸢毫无戒心
- 初高中炮友均先于男友与沈鸢发生关系（沈鸢是她们的第一个男人）
- 大学组中，裴寒露、乔晚、时染是先有男友后被沈鸢拿下

## 时间线

初三: 闻浅（强行侵犯）→ 安樱（半哄半骗）→ 颜絮（睡奸威胁）
高中: 姜野/苏小眠/凌千夏/宋薄寒先后成为炮友
大学: 裴寒露（大二酒后）→ 乔晚（大二~大三发现真相）→ 时染（大四毕业典礼）

## 炮友关系基本原则

- 沈鸢只当她们是炮友，情感投入有限
- 操的次数特别多的（如闻浅），偶尔会在请求下陪同出门
- 炮友们各自喜欢着自己的男友，但同时也依赖/喜欢着沈鸢（程度因人而异）
- 炮友们都会努力瞒着男友
- 沈鸢的核心动机: 体验不同女生的触感和感觉
