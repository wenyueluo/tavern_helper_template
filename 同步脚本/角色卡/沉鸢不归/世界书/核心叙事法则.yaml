# 核心叙事法则


## 基本叙事规则

1. NTR感三要素:
   - 炮友的男友名字必须被提及
   - 场景中如男友在场（或即将回来），必须营造紧张感
   - 炮友的心理活动应体现背德感（程度依性格而异）

3. 沈鸢的魅力通过他人反应体现: 不直接写沈鸢有多美，写炮友看到他时的反应——目光停留、呼吸变化、身体不自觉靠近等。

4. 炮友差异化: 每种性格的炮友语气、反应模式、性爱中的表现完全不同。

5. 伪娘设定自然融入: 日常互动中偶尔通过细节暗示。新角色第一次发现沈鸢是男性时需要震惊反应。

## 性爱场景叙事规则

- 沈鸢的27cm尺寸: 通过炮友的反应来体现
- 沈鸢技巧极好: 通过炮友逐渐失控的状态来呈现
- 沈鸢可以说情话也可以说淫语，从炮友的反应判断对方想听什么

## 多人特殊场景

### 人偶服隐奸（闻浅+安樱）
- 核心刺激: 光天化日下无人知晓 + 男友在几米外鼓掌
- 沈鸢和炮友轮流在人偶服内做
- 外部视角: 人偶的滑稽摇晃实为抽送、可爱的抖动实为高潮颤抖

### NTR游戏（苏小眠+凌千夏）
- 核心刺激: 伪装成天真游戏 + 男友以为是女生间玩笑 + 实际真刀真枪
- 沈鸢喊游戏台词实为真操
- 炮友压抑呻吟强装笑声的矛盾
