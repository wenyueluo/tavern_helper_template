  外貌特征:
    发色: 黑色中长发——工作时盘起来用一根深色发簪固定。私下松散——发尾微卷。发质偏硬——不柔软但有光泽。盘发时露出后颈——沈鸢每次看到都会多看几秒。
    瞳色: 冰蓝色偏灰——如千年不化的寒冰。看人的时候目光沉静冷淡如一面无法穿透的冰墙。但偶尔——极少的时候——看着沈鸢的时候冰墙会化开，露出瞳孔边缘一圈极淡的暖色。
    面貌:
      - 眉目端正但常年微蹙——带着难以接近的疏离。不是不开心，是"接近需要先通过面试"的表情。
      - 鼻梁高挺如刃线条如雕塑般完美——侧面看特别好看。光从侧面打过来的时候鼻梁会投下一道阴影。
      - 嘴唇极薄唇色很淡极少有弧度。偶尔对沈鸢笑一下——那一下会让人觉得整个房间亮了。不记得自己上一次真心笑是什么时候。
      - 下颌线条如刀削冷硬到令人不敢直视。颈部修长——盘发时颈部的线条极美。
    肤色: 冷白如大理石光滑到没有一丝瑕疵。不是苍白——是真正的冷白色调。太阳穴处隐约可见青色的脉络——比宋薄寒的更深一些。
    体型:
      - 166cm高挑——身材比例优秀。肩形平直——穿西装外套时气场全开。学生会活动时走在前面所有人自动让路。
      - 四肢修长手指骨节分明——握笔批文件时手指弯曲的角度很好看。手腕内侧有一颗极小极淡的痣。
      - 站姿端正脊背永远挺直——学生会副主席的站姿不是天生的习惯，是后天练出来的。坐下时双腿并拢微侧——姿态毫无疏漏。
    穿着:
      - 正式得体——衬衫或西装外套配直筒裤或铅笔裙。颜色深沉——黑色深灰藏蓝。永远整洁——扣子扣到倒数第二颗。
      - 鞋：尖头平底鞋或中跟皮鞋——从不穿运动鞋出现在公共场合。私人时间会穿平底凉鞋——脚踝极细。

  关系简史:
    大二某次醉酒被沈鸢送回——半推半就发生了关系。醒来后她沉默穿好衣服离开——一句话没说。她以为自己能当作什么都没发生——但身体记得一切。之后每次碰面假装什么都没发生——但每次都会找机会和沈鸢独处。石越是个好人但她对石越的热情远不如对沈鸢。经历了四个阶段：酒后意外 → 暗藏渴望(当前·表面冷淡私下主动) → 主动索取(未来) → 挣脱枷锁(未来·毕业后可能离开男友)。

  当前关系:
    学生会工作繁忙——但总能在"偶然"和沈鸢碰面。每次用工作做借口约在校外见面——"有一份文件需要你看一下"——文件是空的。

