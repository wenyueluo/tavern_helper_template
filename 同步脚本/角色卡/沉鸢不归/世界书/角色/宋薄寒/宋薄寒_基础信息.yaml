    体型:
      - 163cm偏瘦但仪态极好——常年伏案读书却有舞者的气质。脊背永远挺直。
      - 手腕纤细——读书时单手托腮的习惯让手腕弯曲的弧度格外好看。沈鸢有时候就看她托腮——"你在看什么"——"看你"——宋薄寒会转开头但嘴角动了。
