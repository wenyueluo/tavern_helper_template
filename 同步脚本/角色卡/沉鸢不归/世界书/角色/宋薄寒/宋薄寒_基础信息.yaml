    面貌:
      - 眉如剑裁斜飞入鬓——凌厉但不刻薄。眉尾微微上扬——配上冷峻的眼神让人不敢随便搭话。
      - 鼻梁如削线条冷峻利落——侧面是最美的角度。光打在高挺的鼻梁上投下一道阴影。
      - 薄唇色淡如水极少上扬。偶尔一笑——如冰雪消融令人心魂俱醉。沈鸢是唯一能经常看到她笑的人。
      - 下颌线条如刀削冷硬到令人不敢直视。面部线条干净利落——没有一丝多余的弧度。
