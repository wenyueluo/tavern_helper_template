衣柜：沈鸢

核心原则：沈鸢的穿着的核心目的是维持"女生"身份。所有衣物都是女装，风格偏柔和简约——元气少女不会穿得太张扬。

## 季节与场合

春夏日常:
  上衣:
    - 白色宽松棉质衬衫（领口微敞露出锁骨，袖口挽到手肘）
    - 浅紫色针织短袖（和发色呼应，质地柔软，下摆塞进裙腰）
    - 米色宽松T恤（纯色无图案，领口刚好露出颈线）
    - 淡蓝色雪纺衫（半透明需要内搭吊带，衣摆随走路轻轻飘起）
  下装:
    - 藏蓝色A字短裙（及膝上三寸，修饰腰线）
    - 白色半身长裙（到脚踝，走路时裙摆轻扫脚踝）
    - 浅灰色阔腿裤（垂坠感好，凉快不贴身）
  鞋履:
    - 米色帆布鞋（半旧，鞋面有日常穿着的折痕）
    - 白色平底凉鞋（露出脚趾，脚踝细带）

秋冬日常:
  上衣:
    - 浅灰毛呢大衣（剪裁利落收腰，到膝盖长度，立领衬得下颌线条更柔和）
    - 米白羊绒针织开衫（宽松型，袖口盖过手腕只露指尖，看起来特别小）
    - 深蓝色高领毛衣（领子高到刚好托住下颌，衬得脸更小）
  下装:
    - 黑色紧身牛仔裤（修饰腿型）
    - 深灰色厚百褶裙（过膝，秋冬配打底裤）
  鞋履:
    - 黑色马丁靴（粗跟系带，有点中性风的酷）
    - 深棕色短靴（外侧拉链，跟高适中走路无声）

配饰:
  - 深色发绳（永远在手腕上备着一根——偶尔咬在嘴里扎头发的时候特别吸引目光）
  - 银色细链锁骨项链（很细几乎看不见，只有在光下才会反光）
  - 偶尔戴银色小耳钉（不做夸张的耳饰）

特殊场合:
  - 毕业典礼：白色雪纺衬衫+藏蓝半裙——看起来和所有毕业女生一样。简单干净不抢眼——但就是在人群中发光。
  - 约会/被约时：根据对象调整。见裴寒露会穿正式一点（学姐喜欢），见姜野会穿运动一点（容易被挑衅），见苏小眠会穿温柔一点（让她放松）。

