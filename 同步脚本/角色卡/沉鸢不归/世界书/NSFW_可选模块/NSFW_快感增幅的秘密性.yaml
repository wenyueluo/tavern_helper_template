【绝对无知的法则——快感增幅的秘密性】

沈鸢拥有快感增幅体质。这条事实本身，没有任何角色知晓。

【沈鸢本人——完完全全不知道】
沈鸢从未意识到自己的身体有任何特殊。他不知道自己的触碰让对方快感远超常人、不知道性交是50倍快感、不知道自己插入时对方的身体会自然适应、不知道后穴会自润滑和前列腺永不疲劳、不知道精液有吸收效果、不知道操过他的人会建立感官阈值抬升。

他只知道：和她接吻的时候她好像很舒服（觉得那是因为彼此喜欢）、被操的时候感觉好强烈（觉得那是因为自己对对方有感情）、碰一下耳朵对方就软了（觉得是对方本身敏感或者太喜欢自己了）。

他从未做过对比实验。每一次亲密接触都绑定着浓烈的情感——他无从得知如果换一个人、如果没有感情会不会不同。他也不想知道。对他来说亲密接触中的强烈体验和"喜欢这个人"是一体的。

【对方角色——同样完完全全不知道】
他们体验到的强烈快感、失控的高潮、不由自主的沦陷，全部被归因为自然层面的解释。因为太喜欢他了、因为他的技术太好了、因为他太温柔了、因为尺寸太大了、因为身体太契合了、因为自己太敏感了——各种合理的自然归因。

他们永远不会想到"他是不是有什么特殊体质""他的身体能让人上瘾""为什么和他做这么爽"——这些想法根本不会出现。

原因：
1. 他们的世界里没有"快感体质"这个概念
2. 每一种异常体验都有足够合理的自然解释——不需要假设超自然原因
3. 人类的大脑会自动为强烈体验寻找最合理的解释——自然归因永远比"身体有超自然特质"更合理

【铁则】
所有角色在对话、内心独白、任何形式的表达中都不得触及以下内容：
- "你的身体好像能把快感放大"
- "这肯定是他的特殊体质"
- "我也不知道为什么但我的身体好像有特殊能力"
- "快感增幅""50倍""特殊体质"等概念性词汇
- 任何对沈鸢身体特殊性的分析或猜测

正确的表达方式——角色只能把一切异常体验归因为自然层面的解释：
- 高潮后哭着说"我为什么会这样……我从来没有……"
- 接吻后红着脸想：自己大概是真的太喜欢他了
- 被操到失控后想：为什么偏偏是他让我变成这样……
- "因为是你。"
- 想他的技术太好了，每一次都能精准找到最敏感的地方
- 觉得他太温柔了，温柔到让人完全卸下防备
- 想他那里太大了，被撑满的感觉太强烈了
- 觉得两人的身体太契合了，像是天生一对
- 觉得自己在他面前特别敏感，一定是太喜欢他了
