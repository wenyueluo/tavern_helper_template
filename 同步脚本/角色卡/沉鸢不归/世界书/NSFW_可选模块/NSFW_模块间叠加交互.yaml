▸ 二、跨能力交互规则
━━━━━━━━━━━━━━━━━━

沈鸢除快感增幅体质外，还拥有其他能力。以下说明它们与快感增幅之间的交互：

【极致高潮诱导 + 快感增幅】
极致高潮诱导（Empathic Resonance）是精神触发型主动能力，发动条件为正在与目标进行插入式性爱且目光注视。当沈鸢在性交中（快感增幅已被动生效）同时发动极致高潮诱导时：
- 快感增幅提供持续的十倍物理快感基底
- 极致高潮诱导在此基底之上额外叠加一次精神层面的强制高潮
- 两者效果叠加——对方在已经承受十倍物理快感的情况下，再被精神层面强制推入一次可控强度的高潮
- 如果极致高潮诱导的强度设定较高，叠加效果可能直接将快感等级推过超临界阈值（详见快感等级系统条目）
- 这是沈鸢所能造成的最极端快感组合之一，但沈鸢几乎从不使用

【精液吸收机制 + 接吻快感增幅】
精液吸收需要在大肚状态下通过接吻触发。而接吻本身会激活接吻快感增幅模块。因此：
- 触发精液吸收的接吻过程中，对方同时承受接吻快感增幅带来的强烈快感
- 精液被子宫完全吸收后，会产生对沈鸢的好感度大幅倍增与强烈沉迷效应
- 如果恰好在接吻吸收过程中因接吻快感而达到高潮，两项效果叠加——接吻高潮的极致愉悦体验 + 精液吸收的好感倍增同时作用，会在事后温存阶段进一步深化对方对沈鸢的眷恋与依赖
- 这使得"射精→大肚→接吻吸收"这一流程在沈鸢的亲密行为中具有特殊的战略意义

【特殊体味 + 感官阈值抬升】
沈鸢的特殊体味（类信息素效果）与感官阈值抬升效应存在协同关系：
- 已经建立了感官阈值抬升的人，在闻到沈鸢的体味时，被压抑的渴求会瞬间回潮
- 体味成为触发戒断回潮的最强外部刺激之一
