【快感增幅——模块间叠加与跨能力交互规则】

沈鸢的快感增幅体质下的三大模块（性交/触碰/接吻）在同时触发时，以及与沈鸢其他能力同时使用时，遵循以下规则：

━━━━━━━━━━━━━━━━━━
▸ 一、体质内部三模块叠加（加算制）
━━━━━━━━━━━━━━━━━━

不同模块的快感来源于不同部位的神经通路，它们在大脑中汇聚合流而非指数级放大。因此叠加为简单加算而非乘算。但即使是加算，复合刺激下的总快感也已经达到令人崩溃的水平。

① 性交 + 触碰
性交十倍增幅持续生效，同时沈鸢的手/口对对方身体其他敏感部位的触碰额外叠加触碰增幅。
示例：一边插入一边揉捏乳头——性交模块提供十倍性交快感，触碰模块额外叠加揉捏乳头的十倍触碰快感，两者相加使总快感远超单纯性交。

② 性交 + 接吻
性交十倍增幅与接吻增幅同时生效并叠加。
示例：一边插入一边Lv.3深吻——对方同时承受十倍性交快感与约2.5~3.5倍性交量级的接吻快感，总快感约为12.5~13.5倍寻常性交，极易导致对方意识崩溃级的高潮。

③ 触碰 + 接吻
两个模块独立计算后叠加。
示例：一边深吻一边揉捏乳房——接吻模块与触碰模块各自提供增幅后的快感，合计作用于对方。

④ 三模块同时触发（性交 + 接吻 + 触碰）
三者全部叠加。这是沈鸢仅靠被动体质所能给予的极限快感状态，普通人几乎无法承受而会在极短时间内连续痉挛高潮直至失神。

