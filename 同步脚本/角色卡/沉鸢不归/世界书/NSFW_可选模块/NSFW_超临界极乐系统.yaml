超临界极乐的触发判定规则，用于确定快感等级是否突破10级阈值。【前提】沈鸢的被动能力"快感增幅"在性器官接触时自动生效，将快感提升至普通性交的约五十倍，此为基础增益，无法关闭。【安全区间判定（快感等级 ≤ 10，不触发超临界）】安全区间仅存在于非性交场景。因性交模块提供五十倍固定基数，任何形式的插入式性交——哪怕是最温柔、最缓慢、最浅的插入——快感等级最低也直接跳至约50级，不存在安全区间。安全区间仅适用于以下非性交途径：- 触碰快感增幅（10倍法则）：轻触、抚摸等非插入式触碰，快感等级可在1-10区间。- 接吻快感增幅（Lv.1-Lv.2）：碰唇、轻吻等低烈度接吻，快感等级可在1-10区间。此时目标体验到远超常人的极致快感（约普通五至十倍），但意识清醒、身体可控，不会进入超临界状态。一旦接吻升至Lv.3深吻及以上，快感等级即突破10级阈值。【超临界触发判定（快感等级 > 10，触发超临界极乐）】以下任一情况均会导致快感等级突破10级阈值：路径一（物理触发·性交）：任何形式的插入式性交均直接触发超临界极乐。因五十倍基数，快感等级最低约50（中度超临界），随节奏加快、力度加大、插入加深而进一步攀升。路径一（物理触发·非性交）：触碰或接吻强度超出安全区间——触碰力度加重、接吻升至Lv.3及以上——快感等级突破10级阈值。路径二（精神触发）：沈鸢主动使用精神能力"极致高潮诱导"将强度设定超过10级，此时无论物理性交方式如何均可直接触发。路径三（叠加触发）：物理升级与精神能力同时使用，效果叠加，可达到更高的快感等级。【关键要点】- 沈鸢若希望不触发超临界极乐，必须完全避免插入式性交，仅使用触碰或Lv.2及以下的接吻进行亲密互动，且不使用"极致高潮诱导"。一旦插入（性交模块50倍启动），超临界极乐必然触发，无法回避。- 即便在安全区间内（仅限触碰/低烈度接吻），快感增益本身已足够使目标产生强烈好感与依赖。- 触发阈值的边界极为敏感：对于触碰和接吻，从温柔到稍微用力之间的距离极短；对于性交，五十倍基数使阈值在插入的瞬间即被跨越，超临界状态不可逆。

超临界极乐的核心体验原则：绝无肉体痛苦，精神折磨源于道德冲突。【肉体层面——绝对无痛】超临界极乐过程中，无论快感等级多高（11-100），目标绝不会感受到任何肉体痛苦。所有在外人看来极度骇人的生理反应——剧烈痉挛、翻白眼、角弓反张、体液失控、声嘶力竭的尖叫——全部是纯粹极致快感的外在表现。当事人体验的是完全正面的、令人窒息的愉悦海洋。因快感过于强烈而导致身体控制权丧失（大量出汗、流涕、体液横流等）可能带来些许不适感或狼狈感，但这种不适绝非"痛苦"，更类似于无法停止的喷嚏或大笑导致的失控——不舒服，但不痛。【精神层面——真实的折磨】肉体上的无痛并不意味着目标不承受痛苦。精神折磨是真实存在的，其来源包括：- 对自身享受了被迫体验（如强奸、NTR场景）中极致快感这一事实的强烈羞耻与自我厌恶。- 身体背叛意志的无力感：明知应当抗拒却因快感而沉沦、甚至渴求更多。- 忠贞观念与生理反应的剧烈冲突：尤其当目标有伴侣时，在他人面前呈现如此不堪的极乐状态造成的心理创伤。- 病态渴求带来的自我质疑：事后发现自己渴望再次体验，动摇对自身道德与人格的信心。精神折磨的程度因个人性格差异极大——保守者承受的道德冲击远大于开放者。

意识溶解与极乐虚空（Mind Dissolution & Ecstatic Void）是超临界极乐状态下的核心精神体验，所有表现的剧烈程度与快感等级（11-100）正相关。【意识崩解（Consciousness Collapse）】极乐顶点时连贯思维彻底粉碎，脑中仅存汹涌的纯粹快感信号洪流，无法形成任何有逻辑的念头。等级越高崩解越彻底，恢复所需时间越长。这不是痛苦，而是被极致愉悦彻底淹没后意识自然"溢出"的结果。实际上肉体还会有着下意识地行为和反应。【感官剥离（Sensory Detachment）】灵魂仿佛被抛入纯白光芒或无尽黑暗的极乐维度，对外界真实环境的感知断裂，时间感与空间感完全扭曲或消失。当事人沉浸在无边际的愉悦海洋中。【自我蒸发（Ego Evaporation）】羞耻心、理智判断、身份认同等构成"自我"的基石被快感彻底碾碎，仅剩对快感的本能臣服与无底线渴求。在高等级下可能出现短暂完全失忆。事后回想起自己在极乐中毫无底线的状态，是精神折磨的重要来源。【内在幻景（Internal Phantasmagoria）】大脑皮层因快感信号过载产生迷离幻觉——光斑、色彩流、几何图形碎裂——或彻底空白。幻觉的复杂度和持续时间随等级提升。【矛盾心理（Paradoxical Psychology）】强烈的失控感与极致愉悦交织。目标可能既恐惧自我湮灭又无法抗拒地沉沦其中，这种体验留下永恒烙印。对于性格保守的人，意识到自己竟享受了这种被"摧毁"的感觉，会造成尤为严重的精神折磨与背德感；对于开放者，则可能混合着震撼与病态的兴奋。精神折磨的核心不在于过程中的肉体感受，而在于事后对自身道德与欲望的深刻动摇。

超临界极乐状态下的生理失控与极限反应（Physiological Derailment & Limit Reactions），所有表现与快感等级（11-100）正相关。外观可能极度骇人，但当事人不会感到肉体痛苦——一切失控反应皆为极致快感的外在投射。【声音（Vocalization）】爆发出极度高亢、破碎、变调的尖叫与呻吟，音量和失真度随等级提升，可能超越正常人声频率范围，混杂濒临意识边缘的呜咽、抽噎、嘶吼。语言能力完全丧失，仅能发出无意义的音节。【毁灭性痉挛（Devastating Spasms）】全身剧烈、完全不受控地痉挛、抽搐、弹跳，幅度与频率随等级提升。脊柱过度后弓（角弓反张）现象明显。四肢或疯狂挥舞或完全僵直。本能地呈现极度暴露姿态：双腿不受控大张（M字开腿）、臀部高撅剧烈耸动、腰胯疯狂扭摆。这些并非痛苦抽搐，而是身体被快感电流贯穿后的不自主反应。【体液洪流（Fluid Torrent）】- 爱液：短时间内远超常规分泌量，迅速浸透大片区域。- 汗水：瀑布般涌出瞬间湿透全身。- 泪液与唾液：生理性不受控大量溢出、混合流淌（非因痛苦，而是神经系统全面失控的结果）。- 乳汁喷射（通常50级以上）：即使非哺乳期女性也可能因激素剧变而应激性不受控喷射乳汁。- 盆底失控：括约肌完全失控，可能导致大量潮吹液不受控喷涌，甚至短暂大小便失禁。是身体控制系统彻底崩溃的标志，发生概率和程度随等级提升。- 因体液失控导致的狼狈感可能令当事人感到些许不适或难为情，但不构成肉体痛苦。【内外绞榨（Internal & External Wringing）】全身肌肉尤其盆底肌群、子宫、阴道壁发生极其强烈、持久、高频的节律性收缩。阴道内壁以惊人力量和频率疯狂绞榨蠕动，每一次收缩都产生新的快感浪潮，加剧失控循环。收缩强度、持续时间、频率均随等级提升。【生命体征】心跳飙升至生理极限，呼吸极度急促短浅甚至短暂停止，面色深度潮红或酱紫或苍白，体温急剧升高。高等级下有诱发短暂昏厥风险，但世界规则保护目标不会产生永久伤害。

阿黑颜（Ahegao）是超临界极乐状态下意识丧失边缘的非自愿面部表情凝固现象。快感等级越高越易出现，表现越典型，持续时间越长。完全非自主，当事人无法控制也无法阻止。【面部特征】- 双眼完全上翻露白或在眼睑下高速颤动。- 瞳孔极度涣散或异常收缩/放大。- 嘴巴大张至极限，舌头无力吐出或僵直伸出。- 面部因充血呈深红至酱紫色。- 高等级时可能伴随短暂面部肌肉抽搐。- 极罕见情况（约80级附近）：瞳孔可能呈现短暂的心形或破碎星辰状幻影。【伴随体液】汗水、泪水、唾液、淫液（及可能的乳汁）汹涌流淌混合，面部与身体景象极度狼藉。【肢体姿态】双手紧握扭曲蜷曲或无力摊开。偶因极端痉挛，双手在身体两侧或上方形成僵直V形手势（纯属生理巧合，非有意为之）。M字开腿是此状态下极常见的本能姿态。【本质含义】阿黑颜是个体被快感彻底淹没、自我意识暂时消亡的直观视觉证明。身体沦为纯粹快感反应载体的象征。此表情对当事人而言并无肉体痛苦，是纯粹极乐溢出的外在表现，但对外人而言可能极具视觉冲击甚至令人恐惧。对沈鸢而言，这是NTR满足感与征服欲的重要视觉来源。
