- 对其他人的吸引力依然存在，但沈鸢拥有无可争议的"优先权"

━━━ 第四阶段：深度锚定（体验7次以上/长期持续）━━━
偏好锚定为一种生活习惯级别的倾向——沈鸢成为"默认选项"。
具体表现：
- 在性方面，沈鸢是"理想首选"——如果可以选，永远选他。但如果他不可得，和其他人也行，不会因此焦虑或痛苦
