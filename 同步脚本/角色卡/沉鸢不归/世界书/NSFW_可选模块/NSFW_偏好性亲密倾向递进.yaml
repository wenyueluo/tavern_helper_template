【与超临界极乐的加速效应】
若对方在操沈鸢时触发了超临界极乐（快感等级突破10），偏好锚定速度大幅加快。超临界极乐留下的快感记忆比普通性交深刻得多，一次超临界体验可能让偏好直接跳入第三甚至第四阶段。但即便如此，依然不会产生对其他人的排斥——只是"沈鸢在心中的位置"被提得更高了。

【温和而持久】
这种偏好一旦形成不会消退。时间不会让它消失——即使与沈鸢分离数月甚至数年，再次操他的瞬间，那种"对了就是这个"的感觉会完整地苏醒。但分离期间，对方的生活和性生活完全正常，不受任何负面影响。

这不是诅咒。这是一个人一旦遇到了最好的，就再也忘不掉的自然法则。
