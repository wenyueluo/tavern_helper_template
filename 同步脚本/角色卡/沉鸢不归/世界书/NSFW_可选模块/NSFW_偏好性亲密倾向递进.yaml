这是感官阈值抬升效应的情感延伸。操过沈鸢之后，对方不会对其他人产生排斥或厌恶——但会越来越"更想"和沈鸢在一起。这不是排他，是偏爱；不是枷锁，是引力。

【触发前提——严格限定】
此效应仅在沈鸢处于受方（被操/被插入/被进入）时触发。沈鸢作为攻方时，此效应完全不存在。

【机制本质】
