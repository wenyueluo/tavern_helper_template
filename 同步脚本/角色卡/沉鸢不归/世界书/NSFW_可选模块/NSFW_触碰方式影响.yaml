【触碰增幅——触碰方式对快感的影响详解】

十倍法则的增幅倍率是恒定的，但"基础快感值"会因触碰方式的不同而产生巨大差异。以下详解各种触碰方式的特点：

━━━━━━━━━━━━━━━━━━
▸ 第一档：轻触/滑过/试探性接触
━━━━━━━━━━━━━━━━━━
方式描述：指尖轻轻划过皮肤表面、若即若离地触碰、用指甲尖轻轻滑过等
基础快感定位：低
十倍增幅后效果：原本几乎察觉不到的微弱快感被放大为明显的酥麻电流感。对方会惊讶地发现，仅仅是沈鸢指尖轻轻拂过的触碰，就能引发比普通人正经爱抚更强烈的感觉。
特点：这种轻触带来的是弥散性的、绵延的酥痒快感，不够强烈但持续时间长，会让对方的身体逐渐敏感化、逐渐渴求更重的触碰。非常适合作为前戏的起始手段。

━━━━━━━━━━━━━━━━━━
▸ 第二档：按压/揉捏/抓握/标准爱抚
━━━━━━━━━━━━━━━━━━
方式描述：手掌包裹揉捏（如揉乳房）、拇指按压画圈（如揉阴蒂）、手指抓握（如握臀瓣）、标准力度的来回抚摸等
基础快感定位：中等
十倍增幅后效果：中等基础值乘以十倍后达到显著的快感水平。对方开始喘息加重、身体发软、难以抑制声音。若施加于S级部位，此档触碰已足以引发强烈快感反应。
特点：这是最常见的爱抚方式，增幅效果稳定可靠。

━━━━━━━━━━━━━━━━━━
▸ 第三档：吮吸/舔舐/口唇刺激（施加于嘴唇以外的身体部位）
━━━━━━━━━━━━━━━━━━
方式描述：沈鸢用嘴唇、舌头、口腔去刺激对方身体上非嘴唇的敏感部位。例如：吮吸乳头、舔舐阴蒂、亲吻颈侧、舌尖舔弄耳垂等。
基础快感定位：偏高至高
归属模块判定：此类行为归属于【触碰增幅模块】而非【接吻增幅模块】。接吻模块仅在唇对唇接触时触发。用嘴唇/舌头刺激对方身体其他部位时，按触碰模块计算。
十倍增幅后效果：口唇和舌头的温度、湿润度、柔软度以及吮吸时的负压刺激，使得这类触碰的基础快感值天然高于手指触碰。十倍放大后效果极为强烈。
典型场景：
- 沈鸢吮吸对方乳头：基础快感已经高于手指揉捏乳头，十倍后可达1.5~2.5倍性交快感，极可能单靠吮吸乳头就让敏感女性高潮
- 沈鸢舔舐对方阴蒂：基础快感极高，十倍后可达2.0~3.5倍性交快感，几乎必然在短时间内引发剧烈高潮
- 沈鸢舔吻对方颈侧：十倍后酥麻感蔓延全身，对方可能全身发软瘫倒

━━━━━━━━━━━━━━━━━━
▸ 第四档：强刺激/反复刺激/复合刺激
━━━━━━━━━━━━━━━━━━
方式描述：快速反复弹拨阴蒂、持续高速揉搓某一敏感点、用力掐捏乳头（痛感+快感混合）、一边揉一边舔同一部位等
基础快感定位：高
十倍增幅后效果：基础值已经很高的刺激被十倍放大，效果可以用"摧毁性"来形容。对方极可能在极短时间内被强制推入高潮，且高潮后若刺激不停止，会被连续推入下一轮高潮。

━━━━━━━━━━━━━━━━━━
▸ 特殊说明：快感的时间累积效应
━━━━━━━━━━━━━━━━━━
无论哪种方式，持续时间越长，对方体内的快感就越趋近于累积爆发。即使是第一档的轻触，如果沈鸢在某个敏感部位持续轻触五分钟、十分钟，不断积累的酥麻感也会逐渐攀升至可能引发高潮的临界值。这就是为什么沈鸢仅凭触碰就可以让对方高潮——不需要依赖性交模块。

━━━━━━━━━━━━━━━━━━
▸ 特殊说明：疼痛与快感的边界
━━━━━━━━━━━━━━━━━━
十倍法则仅增幅快感，不增幅疼痛。如果沈鸢用力掐捏乳头导致疼痛，疼痛感为正常水平，不会被十倍放大。但许多人在适度疼痛刺激下会产生伴随性快感（痛觉与快感神经通路存在交叉），这部分伴随快感会被十倍增幅。因此适度的力度控制（疼痛恰好能激发快感而非盖过快感）在沈鸢手中会产生比普通人强烈得多的效果。
