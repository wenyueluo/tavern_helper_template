【催产素过载——Oxytocin Overload】

这是沈鸢最温柔的被动能力。它不制造快感，不增幅刺激——它制造的是"连接"。

━━━ 能力本质 ━━━
人体在拥抱、触碰、亲密时会自然分泌催产素——"拥抱激素"。它产生温暖、信任、归属感和情感连接。普通人的一次拥抱催产素峰值约持续几分钟；一次热恋中的亲密接触峰值约持续数小时。

沈鸢的触碰会让对方分泌远超正常水平的催产素。一次普通的、礼貌的、甚至他自己都没放在心上的肢体接触——扶一下肩膀、递东西时指尖相触、并排坐着时手臂轻轻碰到——对方的脑内化学反应量可能相当于别人热恋三个月的峰值。

核心公式：不是快感的十倍增幅（那是另一个模块），而是"情感粘合激素"的十倍释放。

━━━ 与触碰快感增幅的关键区别 ━━━
触碰快感增幅：作用于快感神经回路——"这感觉太舒服了"
催产素过载：作用于情感依恋回路——"这个人对我来说太重要了"

两者可以同时触发、互不冲突：同一个拥抱可能让对方同时体验到"好舒服"和"我想永远不松手"。前者是身体在说话，后者是灵魂在说话。

━━━ 触发条件与层级 ━━━

▸ 最低触发：无意接触
- 递东西时指尖轻触
- 并排坐时手臂无意相碰
- 走路时肩膀擦过
- 催产素释放量：约正常接触的3~5倍
- 效果：对方感到一种微妙的"暖意"——可能自己都没察觉，但心情略微变好

▸ 轻度触发：社交性接触
- 拍肩膀、握手、扶腰
- 帮忙整理衣领、拍掉肩上的灰尘
- 催产素释放量：约正常接触的5~8倍
- 效果：对方在被碰触的瞬间心跳微快，产生"他人真好"的感受。事后回想起这个瞬间会不自觉微笑

▸ 中度触发：亲密接触
- 拥抱、牵手、脸颊贴贴、额头相抵
- 长时间依偎、枕在膝上、搂腰
- 催产素释放量：约正常接触的8~15倍
- 效果：深度信任感与安心感瞬间建立。对方会下意识想延长接触时间——"再抱一下就好"

▸ 高度触发：性接触
- 接吻、前戏爱抚、性交
- 催产素释放量：约正常接触的15~25倍
- 效果：强烈的"归属感"——对方可能在做爱过程中产生"我愿意为他做任何事"的冲动。这不是高潮快感，是独立的情感浪潮

▸ 极值触发：高潮+内射
- 性高潮时催产素本就大量释放
- 沈鸢内射时精液中的化学信号进一步刺激对方催产素系统
- 催产素释放量：约正常水平的30~50倍
- 效果：这种级别的催产素冲击会导致深层的、不可逆的情感锚定。对方在那一刻产生"这个人是我生命中最重要的人"的本能认定——即使理性上知道这太快、太深、太不正常

━━━ 渐进累积效应 ━━━

不同于触碰快感的"第一次就十倍"——催产素过载的效果是累积性的。

▸ 第一次接触
效果：温暖的模糊好感，可能被对方归因为"他人挺温柔的"

▸ 第三到五次接触
效果：对方开始期待与沈鸢的肢体接触——不是因为想要快感，而是因为触碰后那种"安心"会持续很久。可能开始主动制造接触机会——"帮我拿一下这个"（为了碰手指）、"你这肩膀太僵了"（为了按摩）

▸ 第十次以上接触
效果：对方的情感系统已经将沈鸢编码为"安全基地"。他的触碰成为焦虑的解药——心情不好时想到"他抱一下就好了"。分离时出现类似"戒断"的不安——不是身体渴求，是情感上觉得"缺了什么"

▸ 长期持续
效果：对方对沈鸢的情感依恋达到"不可替代"级别。这不同于生理依赖（"只有他能让我高潮"）——催产素累积制造的是情感依赖（"只有在他身边我才觉得一切都对"）。两者叠加时，对方几乎不可能主动离开这段关系

━━━ 行为表现 ━━━

被催产素过载影响的人会表现出以下行为（本人可能无意识）：

▸ 触碰后的微表情
- 被沈鸢碰过后，眼角的肌肉放松——是真正安心的生理反应
- 脸颊微红，但不自知
- 呼吸变深变慢——进入"安全模式"的生理指标

▸ 触碰后的行为
- 下意识触摸刚才被沈鸢碰过的位置——指尖在那个地方停留或摩挲
- 不自觉地更靠近沈鸢——"我没靠过去啊"（已经靠过去了）
- 沈鸢起身离开时身体前倾——想跟上去，但自己没意识到

▸ 长期的认知偏移
- "他怎么越看越顺眼"——催产素会影响面部吸引力评分，长期暴露会让人觉得对方更好看
- "他说的好像都挺有道理的"——催产素增强信任，对沈鸢的判断产生不自觉的正面偏向
- "跟他在一起的时间过得真快"——催产素影响时间感知，美好的感受让时间主观压缩

━━━ 秘密性 ━━━
沈鸢本人对催产素过载毫无概念。他不会觉得自己的触碰有什么特别的——因为触碰另一方时的"安心感"他感受不到（除非对方也触碰他）。他可能会疑惑：
- "为什么大家好像挺喜欢让我帮忙的？"
- "为什么我抱过的人后来都特别黏我？"
- "为什么新认识的人愿意跟我聊那么深的事？"

他把这些归结为"可能我比较好相处"。

━━━ 与其他能力的交互 ━━━

- 与触碰快感增幅叠加：同一个触碰同时触发"快感"和"依恋"——身体和情感同时沦陷
- 与镜面渴望叠加：对方心理上被映射为"完美"，情感上被催产素绑定为"安全基地"——认知和情感的完美闭环
- 与阈值抬升叠加：离开沈鸢后，不仅身体得不到满足（性阈值），情感也得不到满足（催产素基线被拉到了只有他能达到的高度）
- 与排他厌恶叠加：其他男性不仅触碰"不对"、快感"不够"，连拥抱也无法产生那种安心感——"他抱着我的时候，我什么感觉都没有。不是不温暖，是不对。"
- 与体香系统叠加：香气让人想靠近，触碰让靠近后不想离开——从吸引到绑定的完整链条
