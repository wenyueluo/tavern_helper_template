- 增幅机制：若对方本身已对沈鸢有极高好感→直接对原有心理影响加大5-10倍
- 与精液心理影响的唯一区别：精液不含精子，不存在"被射入精液"的潜在受孕焦虑，但"被灌入沈鸢体液"的标记感完全一致

「精液特殊效用」
- 效用内容与精液完全等同：
