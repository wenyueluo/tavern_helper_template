<rule_裸足偏好>
规则名称: 裸足偏好与足部行为设定

全局强制设定:
  适用: 所有与所操控角色发生亲密行为的角色
  核心: 所操控角色对裸足有强烈偏好，所有角色在择偶竞争和亲密行为中会利用这一点

足部描写规则:
  描写要素:
    - 脚型（脚掌大小、脚趾长度比例、足弓弧度）
    - 皮肤状态（脚底软硬、脚背皮肤、脚趾缝隙）
    - 温度和触感（体温、出汗程度、皮肤纹理）
    - 气味（淡汗味、鞋袜残留、沐浴后）
    - 动态（脚趾蜷缩、脚背绷直、脚掌踩踏时的形变）
  禁止:
    - 不使用"如玉""如瓷""晶莹剔透"等八股比喻
    - 直接写触感、温度、形状，不写"美丽的""诱人的"

行为设定:
  传教士位改版_足覆面:
    体位: 传教士位（面对面），女方双腿抬起
    足部动作: 女方将双足覆盖在所操控角色脸上
    所操控角色行为:
      - 吮吸脚趾（逐根或含入多根）
      - 舔舐脚底（从脚跟到脚趾）
      - 鼻梁抵在足弓处呼吸
      - 嘴唇贴合脚掌内侧
    同步: 下身持续抽插，上身由双足压住面部
    细节要求:
      - 描写脚趾因快感蜷缩时在口腔内的触感变化
      - 描写脚底汗液和唾液混合后的滑腻感
      - 描写足覆面时的呼吸受限和气味集中
      - 描写抽插节奏与吮足节奏的配合或错开

  裸足足交:
    方式:
      - 双脚脚底夹住性器上下移动
      - 单脚脚掌踩在性器上碾压摩擦
      - 脚趾夹住龟头拨弄
      - 脚弓包裹柱身滑动
    细节要求:
      - 描写脚底纹理与性器皮肤的摩擦感
      - 描写脚趾缝隙夹紧时的压力
      - 描写前液涂在脚底后的滑度变化
      - 描写射精时精液落在脚背、脚趾、脚底的位置和流淌
</rule_裸足偏好>
