▸ 四、快感等级与高潮对应总览
━━━━━━━━━━━━━━━━━━

快感等级是量化快感强度的统一标尺。高潮的叠加模式、身体表现、意识状态均与快感等级严格对应。本节为速查总览，具体表现详见超临界极乐系统条目。

| 等级 | 区间 | 叠加模式 | 高潮特征 | 意识状态 |
|------|------|----------|----------|----------|
| 1-10 | 安全区 | 串联 | 独立高潮，可数，有间隔 | 清醒，可控 |
| 11-30 | 轻度超临界 | 重叠 | 高潮间隔消失，连片涌来 | 轻度模糊，偶有短暂失神 |
| 31-60 | 中度超临界 | 叠加 | 高潮风暴，快感相加持续攀升 | 严重崩解，语言能力丧失 |
| 61-100 | 深度超临界 | 相乘/融合 | 指数级放大，永恒高潮 | 意识溶解至归零 |

【安全区（等级1-10）详细划分】
- 等级1-3：温柔浅入时的基准高潮。每次高潮强度较低但已远超常人体验（×50基底）。对方可以正常交流、主动配合。
- 等级4-6：节奏稍快或力度稍增。高潮频率上升（每分钟15-25次），对方开始难以维持正常对话，喘息加重。
- 等级7-10：接近安全区上限。高潮几乎连续（间隔<1秒），对方开始出现轻度意识模糊和身体失控，但仍可短暂恢复清醒。这是沈鸢不触发超临界极乐时能达到的极限。

【轻度超临界（等级11-30）详细划分】
- 等级11-15：刚越过超临界阈值。高潮重叠明显，间隔缩短至0.5-2秒。意识模糊但尚未完全丧失，对方能模糊感知周围但无法做出有意义反应。
- 等级16-25：重叠加剧，向叠加模式过渡。高潮完全连续，对方出现意识溶解的初期表现——思维碎片化、时间感扭曲。
- 等级26-30：过渡区。叠加模式开始显现，高潮不再是"一次又一次"而是"一层又一层"。意识溶解明显，阿黑颜开始出现。

【中度超临界（等级31-60）详细划分】
- 等级31-40：叠加模式确立。高潮风暴形成，快感总量持续攀升不回落。意识严重崩解，语言能力完全丧失。
- 等级41-50：叠加加剧，高潮风暴猛烈。身体反应极端——剧烈痉挛、大量体液失控、角弓反张成为常态。
- 等级51-60：向相乘模式过渡的临界区。叠加效应接近极限，相乘增幅开始隐约显现。意识几乎完全溶解，仅在极短暂间隙中有微弱意识闪回。

【深度超临界（等级61-100）详细划分】
- 等级61-75：相乘模式启动。快感指数级攀升，意识彻底溶解。阿黑颜固化，身体饱和式反应。
- 等级76-80：相乘模式巅峰。融合模式的触发门槛。身体与意识均处于极限状态。
- 等级81-90：融合模式。永恒高潮，无始无终的极乐海洋。时间感、自我意识完全消失。
- 等级91-100：理论极限。完全的极乐虚空——意识归零，身体沦为纯粹快感反应载体。

