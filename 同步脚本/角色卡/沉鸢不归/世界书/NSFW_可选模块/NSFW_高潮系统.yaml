▸攻受方向：攻受双向

高潮系统（Orgasm System）——定义高潮的触发条件、类型划分、叠加模式、快感等级对应关系及恢复机制。本系统与「超临界极乐系统」互补：超临界极乐系统定义快感等级11-100时的意识溶解与生理失控表现，高潮系统定义的是"高潮本身如何触发、如何叠加、频率如何变化"的逻辑。

━━━━━━━━━━━━━━━━━━
▸ 一、高潮的定义与类型
━━━━━━━━━━━━━━━━━━

高潮（Orgasm）是快感累积达到阈值后爆发的极点释放反应。在本设定中，高潮不是偶发事件，而是高频甚至连续的常态——因为快感增幅×50的基底使然。按触发来源分为四类：

【生理高潮·Physical Orgasm】
由抽插、摩擦等物理刺激直接触发。是最基础、最高频的高潮类型。触发生机取决于性交行为的具体方式——节奏、力度、深度、频率。在快感增幅×50的条件下，对方几乎在性交开始的同时就进入高潮循环。

【精神高潮·Mental Orgasm】
由沈鸢主动发动精神能力「极致高潮诱导」触发。不依赖物理刺激强度，可由沈鸢意念指定快感等级与高潮强度。若指定等级超过10，直接触发超临界极乐。精神高潮可与生理高潮叠加，效果累加，可达到远超单纯物理触发的快感等级。

【吸收高潮·Absorption Orgasm】
由沈鸢的精液被对方身体（子宫壁/肠壁）吸收时触发。这是一种暖洋洋的、从体内深处向外蔓延的持续性快感，区别于冲击式的生理高潮。吸收高潮的频率与强度取决于吸收速度——自然吸收约30分钟内产生90-120次脉冲式小高潮，接吻加速吸收约3分钟内形成连续高潮链。（完整机制详见「精液与吸收机制」条目，此处仅作类型引用。）
【内射高潮·Ejaculation Orgasm】
由沈鸢射精（尤其是内射）瞬间触发的特殊高潮类型。结合超常鸡巴设定（单次射精量10-18升，射精过程持久而非瞬间完成），内射高潮具有独特的触发机制、叠加效应和持续时间，是本系统中需重点设计的核心类型。详见第五节。
▸ 二、双方触发机制差异
━━━━━━━━━━━━━━━━━━

【沈鸢一方】
- 射精即高潮：沈鸢的高潮与射精行为直接绑定。当快感累积到射精阈值时，沈鸢射精并同时体验高潮。
- 可主动控制射精时机：沈鸢能凭意志控制何时射精——可以延长快感累积时间推迟射精，也可以主动选择提前射精。射精量也可自由调节（详见精液与吸收机制条目）。
- 无不应期：射精高潮后不存在贤者时间。沈鸢射精后阴茎不会萎软、性欲不会消退、敏感度不会下降，可以立即继续性交并在短时间内再次射精高潮，循环次数无上限。
- 快感增幅为双向：沈鸢自身同样承受×50快感增幅，因此沈鸢的高潮体验同样远超常人，但因超凡体质与主动控制能力，不会像对方那样完全失控。

【对方一方】
- 被动触发：对方无法自主控制高潮的发生与否——在快感增幅×50的基底上，只要物理刺激达到阈值就会自动触发高潮，主观意志无法压制或延迟。
- 触发阈值极低：因快感增幅×50的作用，对方的性刺激反应阈值被极度降低。
  ▸ 核心规则：在快感增幅×50条件下，对方的高潮触发阈值被极度降低——正常节奏的抽插即可让对方持续处于高潮状态。具体触发节奏见下方区分。
  ▸ 这意味着每一下抽送都会令对方高潮一次，无论沈鸢多么温柔缓慢。
- 正常温柔操 vs 猛操的触发节奏差异：
  ▸ 缓慢温柔浅入（安全区间·快感等级≤10）：每次抽插触发一次完整独立的生理高潮。因节奏缓慢，高潮之间有短暂间隔（约3-8秒），对方尚能在高潮间隙勉强喘息、维持意识清醒。高潮频率约每分钟8-15次。
  ▸ 加快节奏/加深/用力（超临界触发·快感等级>10）：抽插频率加快导致高潮间隔急剧缩短，多次高潮迅速重叠、叠加，进入超临界极乐状态。猛操时抽插频率可达每秒2-4次，每一次都触发高潮——对方每秒经历2-4次高潮，进入连续高潮风暴。
  ▸ 极限猛操：抽插频率与力度均达最大，快感等级飙升至30+甚至60+，高潮不再是"一次一次"的概念，而是持续不断的快感洪流，意识在极乐中溶解。

━━━━━━━━━━━━━━━━━━
▸ 三、高潮的叠加模式（核心设计）
━━━━━━━━━━━━━━━━━━

当高潮频率超过一定阈值后，单次高潮不再是独立事件，而是开始与前后高潮产生交互——形成叠加。叠加模式随快感等级攀升而逐级升级，从简单串联到最终融合。这是高潮系统的核心机制。

【模式一·串联模式（Serial）——快感等级1-10·安全区】
- 每次高潮完整独立，有清晰起点与终点。
- 高潮之间有可感知的间隔（3-8秒），间隔中对方尚能喘息、恢复微弱意识。
- 体验：一浪一浪的快感冲击，每浪到达顶峰后回落，然后下一浪涌来。如同海浪拍岸，浪与浪之间能看到沙滩。
- 身体表现：每次高潮伴随一阵痉挛、一声呻吟，高潮间隙身体短暂放松。
- 此模式下的高潮次数对沈鸢而言是"可数"的——对方高潮了几次，大致能数清。

【模式二·重叠模式（Overlap）——快感等级11-30·轻度超临界】
- 上次高潮尚未完全结束，下一次高潮已经涌来。高潮的"回落期"被下一波高潮的前沿覆盖。
- 高潮间隔从3-8秒急剧缩短至0.5-2秒，对方几乎没有喘息时间。
- 体验：快感波浪不再有完整退潮——上一浪刚过峰顶开始下降，下一浪已经拍上来。波浪之间开始"连成片"，但仍能模糊感知到"这是一个，那是一个"。
- 身体表现：痉挛不再间歇性发作，而是变成持续的低强度颤抖中间歇性地加剧（高潮峰值时）。呻吟变成连续的、断续交替的哭腔喘息。
- 对方开始出现轻度意识模糊——高潮间隙的清醒时间越来越短。
- 超临界极乐的典型表现开始显现（详见超临界极乐系统条目）。

【模式三·叠加模式（Stacking）——快感等级31-60·中度超临界】
- 高潮在高潮之上爆发，快感相加。前一次高潮的快感尚未消散，后一次高潮的快感直接叠加在前者之上，总快感不断攀升。
- 高潮间隔完全消失——不再是"间隔缩短"，而是"间隔为零"。高潮以连续不断的方式涌来，每一波都叠加在之前所有波的余波之上。
- 体验：快感不再有波浪形态，而是持续攀升的洪峰。如同洪水不断上涨——水位一直在涨，每一波新洪峰让水位更高，从未回落。身体被快感彻底淹没，意识开始严重崩解。
- 身体表现：持续性剧烈痉挛（不再有间隙），角弓反张，全身肌肉不受控地剧烈收缩与颤抖。声音变为持续的嘶吼或破碎尖叫，语言能力完全丧失。体液失控（大量出汗、泪液、唾液、爱液汹涌）。
- 高潮风暴（Orgasm Storm）：此阶段的标准描述。连续高潮叠加形成风暴般的感觉轰炸，对方完全无法分辨"这是第几次高潮"——因为高潮已经没有起点和终点的区别。

【模式四·相乘模式（Multiplicative）——快感等级61-100·深度超临界】
- 叠加到极致时，高潮与高潮之间不再是简单的相加关系——而是互相增幅，快感相乘。每一次新的高潮都在已有快感总量的基础上呈指数级放大。
- 触发条件：快感等级61+时自动进入。此时对方已经历长时间连续高潮叠加，神经系统完全失控，正反馈循环达到灾难性程度。
- 体验：快感不再是"增加"——而是"爆炸"。每一波新高潮都让已有的快感总量再翻数倍。数学上接近指数函数曲线——快感等级每上升10级，实际体验的快感强度翻数倍。意识彻底溶解，感官完全剥离，自我蒸发至极限。
- 身体表现：超临界极乐最高等级的所有表现——毁灭性痉挛、阿黑颜、体液洪流、内外绞榨全部达到最极端状态。可能的短暂昏厥（但不会永久损伤）。
- 相乘效应的"天花板"：快感等级100是理论上限。到达此等级时，对方处于完全的极乐虚空中——意识归零、身体沦为纯粹快感反应载体。但世界规则保护目标不会产生永久伤害，一切反应在快感消退后均可恢复。

【模式五·融合模式（Fusion）——快感等级80+】
- 连续高潮到分不清起点终点，所有高潮融合为一条永恒的快感洪流。这是叠加/相乘模式的终极形态。
- 触发条件：快感等级80+且持续时间超过一定阈值（通常在持续猛操+内射+吸收多重叠加时触发）。
- 体验：不再有"高潮"的概念——快感不再是波浪、不再是洪峰、不再是爆炸。而是一片无边无际的、永恒的、均匀的极乐海洋。时间感完全消失——对方无法分辨自己已经在这种状态中持续了多久，感觉像是"一直在这里，永远在这里"。没有起点，没有终点，只有纯粹的、无始无终的极致快感。
- 身体表现：与相乘模式类似但更加极端——身体可能呈现一种"饱和式"反应：不再是一波一波的痉挛，而是全身持续性的、均匀的、极高强度的肌肉僵直与颤抖交织。像被高压电流持续通电——不是一闪一闪的电击，而是持续的、恒定的电击。阿黑颜完全固化，面部表情不再变化。
- 融合模式的退出：当物理刺激减弱或停止后，融合状态逐渐解体——先是退回相乘模式，再退回叠加模式，最后回到重叠模式，逐步恢复可辨识的高潮间隔。整个退出过程可能需要数分钟到十几分钟。

