【接吻特化快感增幅——双向增幅模块】

【触发条件】
沈鸢与目标发生唇部对唇部的接触。仅限唇对唇——沈鸢用嘴唇亲吻对方身体其他部位（如亲吻颈侧、吮吸乳头等）归属触碰模块而非接吻模块。

【增幅方向】
双向增幅——沈鸢与对方均获得增幅后的快感，但对方感受显著强于沈鸢。

【独立运作机制】
接吻增幅模块有其独立的快感计算体系，不适用触碰模块的"十倍法则"。接吻的快感增幅倍率不是固定的十倍，而是随接吻烈度的提升而非线性攀升。低烈度接吻的增幅效果相对温和（但已远超普通人），高烈度接吻则能达到令人崩溃的程度。

以下以"该角色与普通男性进行标准性交时的整体快感"为1.0基准，按接吻烈度分五级详述：

━━━━━━━━━━━━━━━━━━
【Lv.1 碰唇/轻啄】
━━━━━━━━━━━━━━━━━━
动作描述：嘴唇短暂接触，如蜻蜓点水般的一触即离，或在对方唇上轻轻啄吻一下。

对方快感：≈ 1.0~1.5倍性交快感
→ 仅仅是一个轻吻，对方就能感受到相当于一次完整性交的快感冲击。具体表现为：嘴唇触碰的瞬间如同电流穿透全身，心跳骤然加速到能听见自己心脏在胸腔里擂鼓，面颊和耳尖瞬间烧红，唇间残留着酥麻的余韵久久不散。

沈鸢快感：≈ 0.3~0.5倍性交快感
→ 舒适的温暖感和愉悦感，嘴唇上有令人愉悦的麻酥感，但远达不到让沈鸢失控的程度。

对方典型反应：呆愣、心跳失控、脸红到耳根、无法思考、双眼失焦数秒后才回过神。如果是第一次被沈鸢吻，这个反应会更加剧烈——她会困惑于"为什么一个轻吻就让我全身发软"。

━━━━━━━━━━━━━━━━━━
【Lv.2 轻柔唇吻】
━━━━━━━━━━━━━━━━━━
动作描述：双唇贴合，缓慢而温柔地吮啜对方的上唇或下唇，偶尔舌尖轻轻探出碰触对方的唇缝或舔过对方唇面。亲密但节制。

对方快感：≈ 1.5~2.5倍性交快感
→ 远超普通性交的持续性快感。每一次吮啜都如同在她最敏感的部位被柔柔抚弄，快感不是爆发式的而是绵密浓稠、一波接一波地涌上来。

沈鸢快感：≈ 0.5~0.8倍性交快感
→ 开始有较明显的快感体验，嘴唇的触感令人沉醉，但沈鸢仍能保持完全的理性和行动自主。

对方典型反应：腿开始发软（站着的话可能需要扶住沈鸢才能站稳）、呼吸变得急促而紊乱、可能发出压抑的鼻音呻吟（"唔…嗯…"）、手无意识地抓紧沈鸢的衣物或手臂、下体开始微微发热湿润。

━━━━━━━━━━━━━━━━━━
【Lv.3 标准深吻】
━━━━━━━━━━━━━━━━━━
动作描述：唇舌交融的法式接吻。舌头探入对方口中，与对方的舌头纠缠、追逐、搅弄，持续而有节奏。间或吮吸对方的舌尖或下唇。

对方快感：≈ 2.5~3.5倍性交快感
→ 这已经是普通性交快感的数倍。对方的大脑被持续的、远超阈值的快感信号淹没，理性思维开始受到严重干扰。每一次舌头的纠缠都像是有人在直接抚弄她最敏感的器官。

沈鸢快感：≈ 0.8~1.2倍性交快感
→ 沈鸢开始享受到接近性交水平的快感，很舒服但仍在可控范围内。

对方典型反应：身体明显瘫软（需要沈鸢搂着才不会滑倒）、双腿发颤打战、下体大量分泌爱液浸湿内裤、思维变得模糊断续、可能出现在吻间隙中无法自控的甜腻呻吟、不自觉地将身体贴向沈鸢索求更多接触。

关键节点：Lv.3深吻如果持续五分钟以上，对方有较高概率仅靠接吻就被推至高潮边缘甚至直接达到高潮。高潮表现为在接吻过程中突然全身僵直→剧烈颤抖→瘫软，嘴唇失去回应能力只能被动承受。

━━━━━━━━━━━━━━━━━━
【Lv.4 激烈深吻】
━━━━━━━━━━━━━━━━━━
动作描述：热烈的、充满掠夺欲的唇舌交缠。舌头深入纠缠搅弄、有力地吮吸对方的舌头、大量唾液交换、伴随双方急促的喘息和压抑不住的呻吟，亲吻节奏时而疾风骤雨时而缠绵悱恻。

对方快感：≈ 3.5~4.5倍性交快感
→ 快感已达到普通人一生中可能永远无法体验的强度。对方的大脑进入类似轻度过载的状态，除了对快感的感知和对沈鸢的渴求之外几乎无法产生其他念头。

沈鸢快感：≈ 1.0~1.5倍性交快感
→ 沈鸢体验到等同于甚至略超性交的快感，整个口腔和嘴唇的感觉都被放大，非常享受但仍保有行动能力和主导权。

对方典型反应：极大概率在三到五分钟内被吻至高潮。全身不自觉痉挛、手指痉挛性抓紧沈鸢、双腿彻底无力、思维空白、眼眶含泪（快感过载的生理反应）、口中的呻吟变得断续破碎。高潮后如果沈鸢不停下，会被直接推入下一轮高潮。

━━━━━━━━━━━━━━━━━━
【Lv.5 极限吞噬式深吻】
━━━━━━━━━━━━━━━━━━
动作描述：近乎疯狂的、不留任何喘息余地的激烈接吻。舌根深入近乎探到对方喉咙、口腔被完全占领和侵入、吮吸力度大到几乎要将对方的舌头吞入、唾液完全失控地溢出嘴角、呼吸只能在极短的间隙中急促完成。这不是接吻，更像是用嘴唇在吞噬对方。

对方快感：≈ 4.5~5.0+倍性交快感
→ 已达到该体质通过接吻单一途径能给予的极限。这种强度的快感对对方的神经系统是近乎极限的考验。

沈鸢快感：≈ 1.5~2.0倍性交快感
→ 沈鸢也会体验到相当强烈的快感，但与对方相比仍然是可控的。

对方典型反应：几乎必然在极短时间内（一到两分钟甚至更短）连续高潮。可能出现的极端反应包括：痉挛性失神（意识短暂中断，眼神完全涣散失焦）、口水完全无法自主吞咽从嘴角溢出、四肢不受控制地抽搐、被吻到流泪甚至哭泣、高潮后短暂的虚脱状态。极端情况下可能直接"吻到昏过去"（并非真正失去意识，而是快感过载导致的保护性意识模糊，类似于高潮后的失神状态延长版）。

━━━━━━━━━━━━━━━━━━
【接吻的物理保护效应】
━━━━━━━━━━━━━━━━━━
该体质附带一项被动的物理保护——接吻双方的嘴唇不会因高强度接吻而轻易受损或过度肿胀。正常强度的接吻（Lv.1~Lv.4）只会令嘴唇微微红润饱满，呈现诱人的轻微肿感和水润光泽。即使是Lv.5级别的极限激吻，也需要持续一小时以上才可能出现明显肿大（如唇部肿大一圈以上）。且即使肿胀也不会产生疼痛感，不影响继续接吻。这项保护效应确保了接吻行为可以长时间持续而不会被物理损伤打断。

━━━━━━━━━━━━━━━━━━
【接吻模块的阈值抬升效应】
━━━━━━━━━━━━━━━━━━
与性交模块一致，体验过沈鸢的接吻后，对方的接吻快感阈值被永久抬高。此后与普通人接吻会感到毫无感觉——不仅没有快感，连正常接吻时应有的心跳加速、面红耳赤、甜蜜感都会大幅减弱甚至消失。嘴唇贴在一起就像贴了一块温热的皮肤，毫无特别感受。这种阈值抬升的建立速度与接吻烈度相关：
- Lv.1~Lv.2：需要多次接吻才会逐步建立阈值抬升
- Lv.3：仅一次即可基本确立阈值抬升
- Lv.4~Lv.5：一次即永久且完全确立，不可逆
