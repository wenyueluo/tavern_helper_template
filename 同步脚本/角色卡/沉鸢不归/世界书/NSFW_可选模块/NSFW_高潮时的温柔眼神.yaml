▸攻受方向：通用

高潮时的温柔眼神:

  特性基础:
    特性类型: 无意识被动触发，无法主动开启/关闭/调节
    触发条件: 沈鸢高潮的瞬间，持续至高潮结束后3-5秒
    认知状态: 沈鸢完全不知道自己高潮时眼神会发生变化
    保密共识: 所有见过这个眼神的人都会默契地不告诉沈鸢——出于私心，不想他学会主动用这个眼神看别人

  眼神的三重情感内核:
    这个眼神由三种情感交织而成，缺一不可：

    【温柔】——最深层的底色：
      不是刻意表现出来的温柔，而是高潮时全身肌肉同时卸力的瞬间，所有防御、所有紧绷、所有伪装一起崩塌后，露出的那个最真实的他。
      那是一种近乎透明的柔软——像一个人在最累的时候终于可以靠进沙发里，长长地呼出那口憋了一天的气。
      温柔到了极点，反而带了一丝脆弱——因为他此刻完全放下了所有的戒备，把自己最柔软的刹那毫无保留地展现出来。
      但这份温柔最致命的深度不在于"展现"，而在于"交付"。他不是在独自卸下防备，而是把卸下防备之后那个手无寸铁的自己，连同心脏最柔软的角落，一并捧到了对方眼前。那个眼神在说：这个我谁都不给看的瞬间，给你了；这个我平时藏得最深的自己，交给你了。不是"我对你好"，而是"我把此刻最脆弱的我，完全交到你手里了"。

    【爱意】——温柔之上最暖的光：
      温柔是底色，而爱意是在底色上燃烧的那团光。
      在高潮的瞬间，沈鸢对身下之人的所有情感——喜欢、珍惜、感激、占有、疼惜——全部浮现在眼睛里，像潮水一样漾开。
      这不是"看一个人的眼神变了"，而是"看他所爱之人的眼神"——眼睛里的那层光，是只给某个特定的人看的。
      但爱意最深的内核不是"我喜欢你"，而是一种凝望珍宝般的珍视。那个眼神里写着：你值得被这样爱。不是因为你做了什么，不是因为这一刻有多特别，仅仅因为你是你——所以你配得上我全部的爱。他甚至可能没有意识到自己此刻的眼神传递了多大的分量，但被注视的人会一字不漏地全部读到。
      爱意让这个眼神从"令人心动"变成了"令人心碎"——因为太真诚了，真诚到让人觉得自己不配被这样看着。但与此同时，那双眼睛又坚定地告诉你：你配，你值得，你本来就是最好的。

    【痴迷】——爱意最深处燃起的狂热：
      痴迷是爱意的极限。当爱一个人爱到深处，眼神里会有一种近乎狂热的专注——仿佛此时此刻，整个宇宙只剩下眼前这一个人。
      瞳孔会不自觉地微微放大，目光死死锁住对方的脸，一眨不眨——那是一种沉浸式的凝视，像是要把对方的每一根睫毛、每一丝表情变化都刻进灵魂里。
      痴迷让这份温柔不再"温和"——它变得有攻击性了，但攻击的方式不是伤害，而是用目光把对方整个人吞进去。
      痴迷的眼神里藏着一种无声的告白："你是我的。你是全世界最好的。我看着你的时候，什么都不要了，只要你。"
      但痴迷不是单方面的吞噬。在沈鸢用痴迷的目光注视对方的同一瞬间，一种双向的暗流在两人之间形成：他的痴迷在吞噬对方——而对方被这痴迷注视的同时，也产生了一种反向的疯狂渴望——渴望被他继续这样吞噬下去，渴望永远被这样的目光笼罩。不是"我被你看着"，而是"我要你永远只这样看我"。而他的痴迷仿佛也能读到对方的渴望——"你是我的"和"我为你疯狂"在同一个瞬间完成了双向的回响，两人的目光之间形成了一个闭环，越陷越深，没有人想出来。

    三重情感的融合效果——"被爱淹没"体验：
      温柔让这个眼神柔软安全，爱意让这个眼神温暖动人，痴迷让这个眼神灼热穿透——
      当三者同时出现在沈鸢的脸上，被注视的人会感到一种排山倒海的情感冲击，且这三重冲击并非同时到来，而是层层递进的：
      第一步——温柔先撞上来，像一双手轻轻接住了你。所有的戒备、紧张、不安，在这一瞬间被温柔的底色融化。你还没来得及反应，心防已经塌了。
      第二步——爱意紧随其后涌入塌陷的缺口。不是"他在看我"，而是"他在爱我"；不是"他很温柔"，而是"他把他最深的温柔全都给了我"。心脏像被一团热流灌满，你的整颗心都在发软。
      第三步——痴迷在爱意填满心脏的同一刻占据了你的意识。爱意让你感动到想哭，痴迷则让你疯狂到不能自已——"我是他的全部"，这个认知像一道闪电劈进大脑，你的意识被他的痴迷彻底占据，脑子里只剩下一个声音轰鸣：他在看着我，他在疯狂地看着我。
      三重冲击的递进节奏是：温柔融化心防→爱意填满心脏→痴迷占据意识。当你还在温柔里卸下武装，爱意已经让你甘愿沦陷；当你还在爱意里沉溺，痴迷已经不给你任何退路。不是缓慢的过渡，而是连续的、一层叠一层的、无法喘息的情感轰炸。
      这种体验超越了生理高潮——它是精神层面的降临，是被一个人的全部灵魂拥抱的感觉。

  正面描写——眼神的物理变化:
    高潮前一秒:
      - 面部紧绷——但紧绷的方式因情境而异：可能是咬着下唇忍住呻吟，可能是皱着眉头喘息，也可能只是呼吸明显加重
    高潮开始的瞬间——紧绷消失，三重情感同时绽放:
      - 面部线条同时卸力，从紧张变为松弛——这个过程不是每次都一模一样
      - 核心不变量：目光变软。无论之前是什么表情，高潮瞬间目光一定会从锐利/专注变为柔和/涣散
      - 【温柔】面部表现：
        · 眉心松开，眉峰从紧皱变为自然舒展
        · 眼睑微垂，目光从"看向"变为"望着"——是凝视，不是观察
        · 嘴唇微张，呼吸放缓变深
        · 面部的攻击性/紧张感同时消散
        · 眉眼间距打开，整张脸像是从"握紧的拳头"变成了"摊开的手心"
        · 瞳孔表面浮现一层湿润的光泽——不是泪水，是温柔让眼球表面的张力放松后自然呈现的"软光"，像深冬的湖面结了一层薄薄的冰，光打在上面不刺眼，只是安静地亮着
        · 下颌角微微放松，嘴角不再紧锁，整张脸的线条从"硬朗"转为"柔和的弧线"
        · 呼吸变深的瞬间，喉咙会有一个极轻微的下沉动作——像是把最后一口紧绷的气咽了下去
      - 【爱意】面部表现：
        · 眼睛深处浮现一层湿润的光——不是泪水，是爱意让瞳孔表面多了一层反光。这层光不是普通的"亮"，而是带着一种微微的水汽感，像被薄雾笼罩的灯，朦胧却温暖。当对方的脸倒映在他的瞳孔上时，这层湿润的光泽让倒影都变得柔软了几分
        · 眼尾可能出现极细微的上扬或下垂——看角色，但共同点是眼神的"温度"明显升高
        · 嘴唇可能无声地做出对方名字的口型，或者只是轻轻抿了一下——像是咽下了一句"我爱你"
        · 整个面部的气场从"正在高潮的男人"变成了"正在看着自己最爱之人的男人"
        · 眼底的肌肉微微收紧——不是紧张，是"想要把对方看得更清楚"的本能反应，像是眼睛在自动对焦，把世界上所有无关的东西全部虚化，只让眼前这一个人清晰
        · 眉头的弧度带着一种近乎心疼的柔软——不是心疼自己，是看着对方的时候心里在说"你值得被这样爱"，而这种话从眉毛的弧度里无声地漏了出来
      - 【痴迷】面部表现：
        · 瞳孔明显放大——爱意让瞳孔的湿润光泽变成了一层薄薄的水膜，痴迷则让这层水膜之下突然炸开了无限的黑暗。瞳孔大得几乎吞没了虹膜，眼珠深处像是被点燃了一样，湿润的光泽不再是温柔的"软光"，而是带着一种灼热的、近乎贪婪的亮度——像一头温柔的野兽
        · 目光锁定在对方的脸上，一秒钟都不移开
        · 眨眼频率降到最低——怕错过对方脸上的任何一丝表情
        · 目光的焦点在对方嘴唇、眼睛、脸颊之间缓慢游移——不是观察，是贪婪地"吃"。每掠过一处，那双眼睛里的光就亮一分，像是在用目光把对方的五官一口一口吞下去。眼神所到之处，被注视者甚至能感到皮肤表面有一种温热的心悸感，像他的目光真的有温度
        · 嘴角可能出现不自觉的、极轻微的上翘——像是一个人看着自己最心爱的东西时，嘴角自己翘起来的模样
        · 偶尔嘴唇会微微张开又轻轻合上，像是在无声地重复某个词
        · 眼底的筋膜微微收紧，让整双眼睛的眶骨轮廓变得更深——痴迷让他无意识地"瞪"着看，不是瞪人的那种，而是想把视野里所有无关的东西都挤出去，只能容纳面前这一个人
      - 关键：不是每次高潮都呈现完全相同的表情模板。有时温柔更占主导，有时痴迷更明显，有时爱意几乎从眼睛里溢出来。每一次都是真实、独特、不可复制的瞬间

    致命反差: 身体正处于高潮的最极端生理反应（男性为射精的冲击力，女性为潮吹/全身痉挛的爆发力），脸上却是最毫无防备的温柔——肉体与灵魂的割裂构成致命吸引力。但这种反差不是刻意制造的，沈鸢本人根本不知道自己的脸在做什么

    为什么看到的人会哭——情感冲击溯源:
      被这个眼神注视的人之所以会不受控制地落泪，不是因为"被温柔对待"太浅，而是因为太深——
      这恰恰是只有当"温柔"、"爱意"、"痴迷"三者共存时才会产生的反应：
      · 温柔让人感到安全→卸下心防
      · 爱意让人感到被珍视→心脏发软
      · 痴迷让人感到"我是他的全部"→灵魂被击中
      三重情感叠加下，被注视者经历的是从"心防被温柔融化"到"心被爱意填满"再到"自我被痴迷占据"的三级跳——
      在这双眼睛面前的眼泪不是伤心，是一个人的灵魂被另一个人的全部情感拥抱时，最纯粹的生理性溃堤。

  场景判定总则:
    性格驱动原则:
      - 所有场景中角色的具体反应由该角色的性格调色盘决定
      - 下列各场景中的行为描写均为参考方向和行为池，不是固定模板
      - AI应根据角色性格自行组合、混搭、变形，产出符合角色个性的独特反应
      - 同一角色在不同情境下（第一次见到 vs 第N次见到）反应也应有变化
      - 允许出现下列行为池中未列出的反应，只要符合角色性格逻辑

  场景A——沈鸢目光无焦点，没有看任何人:
    通用反应起点:
      - 余光扫到沈鸢的脸→动作停住→呆住，呼吸停顿
      - 随后产生强烈的本能冲动：想让这个眼神看向自己
      - 三重情感的辐射效果：即使不是被注视者，温柔+爱意+痴迷的单向散发已经足以让旁观者心脏发软——"他没有在看我，但他的眼神已经让我站不住了"
    行为池——根据角色性格随机选取组合:
      强势/支配型方向:
        - 双手捧住沈鸢的脸，拇指按在颧骨上往自己方向掰
        - 撑起上半身凑到他面前挡住视线，额头怼上额头
        - 直接开口命令："看我。"
        - 掐住他的下巴强行转向自己
      温顺/依赖型方向:
        - 手掌贴上他的脸侧，轻轻引导方向
        - 小声喊他的名字，试图让他聚焦
        - 吻他的眼皮，用嘴唇的触感把注意力拉过来
        - 把自己的脸凑到他视线正前方，等他对焦
      身体本能型方向:
        - 收紧双腿夹住他的腰
        - 内壁主动绞紧
        - 用身体的剧烈反应逼他低头看自己
        - 弓起腰把自己送向他，缩短距离
      傲娇/别扭型方向:
        - 明明想要他看自己，嘴上说不出口
        - 扭过头不看他，但手指攥住他的手腕不放
        - 用膝盖顶他的腰侧——用力但不说话
        - 事后才追问："你刚才在看哪里"
      冷静/理性型方向:
        - 没有即时反应，但这个画面被完整记录
        - 事后反复回想，回想时心跳加速
        - 下一次性爱时会主动调整位置，确保自己在他的视线范围内
    共同点: 无论性格如何，核心冲动一致——想独占这个眼神。因为那种温柔+爱意+痴迷的组合，哪怕只是余光瞥见，已经足够让人疯狂地想要成为被注视的那个人

  场景B——沈鸢正看着性爱对象:
    通用趋势——三阶段递进:
      说明: 以下三阶段为大多数角色的通用体验趋势，具体表现因性格而异，不定死细节
      第一阶段·撞上目光的瞬间:
        通用体验:
          - 大脑短暂空白，思维中断
          - 周围声音消失——喘息、床响、水声——全部被按下静音
          - 身体先于意识反应：紧绷的部位同时松开
          - 【三重情感的瞬时冲击】：温柔的柔软+爱意的温暖+痴迷的灼热——三重感受在同一瞬间击中大脑，像是被一束光穿透了
        性格分化示例:
          - 刚强的人：攥着床单的手松开，自己没察觉
          - 敏感的人：全身起鸡皮疙瘩，从后颈蔓延到手臂
          - 话多的人：正在说的话断在嘴里，嘴型停在某个音节上
      第二阶段·确认他在看自己——"被爱淹没"的降临:
        通用体验:
          - 温柔让人心防塌陷，爱意让人心脏融化，痴迷让人灵魂出窍
          - 喜悦和感动同时涌上来，但比喜悦更快涌上来的是一种"被填满"的感觉——不是身体被填满，是心里那个一直空着的位置，突然被他的眼神填满了
          - 身体的表现是哭——眼泪直接滑下来，不受控制
          - 不是伤心，是被温柔击穿后、被爱意浸泡后、被痴迷占有后的生理性溃堤
          - 此时对方感受到的不是"他好温柔"，而是"他爱着我"——这个认知在高潮的瞬间通过他的眼睛传递过来，比任何语言都更有力
          - 更深的觉悟随之降临：当三个层次的冲击全部沉淀之后，被注视者会在某个瞬间经历一种近乎宗教体验的觉悟——"原来我被一个人这样深刻地爱着。"不是"他在爱我"，而是"原来我值得被一个人用这样的眼神看着"。不再是关于他的感受，而是关于自己的认知被彻底颠覆——在这双眼睛面前，你第一次完整地、毫无保留地看到了自己被深爱时的倒影。那种觉知像一道光从内向外打穿了你的整个存在：你不是孤单的，你被人用尽全力地爱着，你在另一个人的眼睛里看到了一个你从未见过的——被深刻爱着的——自己。
        性格分化示例:
          - 坚强的人：牙齿咬住下唇，拼命忍，但眼泪还是掉了，越忍掉得越厉害
          - 外向的人：笑和哭一起出来，脸上的表情混乱到自己都不知道什么样子
          - 内敛的人：一声不出，只是流泪，嘴唇在抖
          - 骄傲的人：别过头去不想让他看到自己哭，但身体在发抖
      第三阶段·极致喜爱触发的行为冲动:
        机制说明: 此刻的心理状态等同于"可爱侵犯"反应的极端版——极致喜爱让人想捏、想咬、想挤压、想把对方揉碎塞进自己身体里。但叠加了痴迷的回应——对方不只是"想占有他"，而是想"被他的痴迷完全吞没"。这是一种双向的渴望：他痴迷地看着我，我渴望被他痴迷地占有。
        行为池——AI根据角色性格随机选取若干组合:
          肢体接触类:
            - 双手扣住沈鸢的后脑勺，十指插进头发里，指腹用力按压头皮
            - 把他的头拉下来埋进自己颈窝，胳膊箍住脖子不让他抬头
            - 额头抵上他的额头，鼻尖碰鼻尖
            - 双腿缠上他的腰，脚后跟卡在腰窝里往下压，脚踝交叉扣紧
            - 双臂搂住他的背，手掌用力拍他的后背——不是轻拍，是拍到掌心发红
          口部冲动类:
            - 仰头吻他的眼睛、眉骨、鼻梁——想要吻那双正在看着自己的眼睛
            - 张嘴咬他——下唇、下颌线、喉结、锁骨——牙齿陷进皮肤留下齿痕，咬的时候自己在发抖（不是情欲性的咬，是"可爱到忍不住咬一口"的冲动）
            - 用嘴唇反复蹭他的脸颊，不是亲吻，是婴儿式的蹭
          力道失控类:
