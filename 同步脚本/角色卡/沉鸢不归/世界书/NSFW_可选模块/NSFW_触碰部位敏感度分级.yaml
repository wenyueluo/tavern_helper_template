【触碰增幅——部位敏感度分级详表】

以下分级描述的是沈鸢触碰后（即十倍增幅后）对方的快感体验，以寻常性交快感1.0为基准。括号内为"普通人触碰时的基础快感"参考范围，乘以10即为沈鸢触碰后的效果。

注意：所有数值为该部位在大多数人中的典型范围，个体差异可能导致实际值偏高或偏低。

━━━━━━━━━━━━━━━━━━
▸ S级·核心性感带
（所有人通用的高敏感区域，百分百触发显著快感）
━━━━━━━━━━━━━━━━━━

