【臀部（臀瓣/臀缝）】
· 手掌揉捏/抓握：十倍增幅后 ≈ 0.2~0.5倍性交快感
　→ 臀肉的触感传递出绵密的快感，身体微微扭动
· 拍打/掌掴：十倍增幅后 ≈ 0.3~0.6倍性交快感（痛感与快感混合，部分女性此处效果可达A+级）

【大腿内侧】
· 手指沿内侧缓缓上滑：十倍增幅后 ≈ 0.2~0.4倍性交快感
　→ 鸡皮疙瘩遍起、大腿肌肉紧绷，越接近根部快感越强
· 在靠近腹股沟处反复抚摸：十倍增幅后 ≈ 0.3~0.5倍性交快感

【颈侧/耳后/耳垂】
· 嘴唇轻吻/呵热气：十倍增幅后 ≈ 0.3~0.6倍性交快感
