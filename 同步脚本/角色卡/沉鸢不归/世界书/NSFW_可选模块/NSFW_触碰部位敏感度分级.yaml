　→ 对方反应：突然的电击般酥麻，腰部不自觉弹起，呼吸骤然急促
· 持续揉按/画圈拨弄：十倍增幅后 ≈ 1.5~2.5倍性交快感
　→ 对方反应：双腿痉挛发抖、无法合拢或反射性夹紧沈鸢的手，喘息变为呻吟，爱液大量分泌
· 快速反复弹拨/振动式刺激：十倍增幅后 ≈ 2.0~3.0倍性交快感
　→ 对方反应：极可能在数十秒至两三分钟内被直接刺激至高潮，全身弓起抽搐

【阴唇/阴道口（外阴整体区域）】
· 指尖沿唇缝轻轻滑动：十倍增幅后 ≈ 0.6~1.0倍性交快感
　→ 酥痒难耐、下体不自觉迎合
· 手指揉搓阴唇/在阴道口画圈逗弄：十倍增幅后 ≈ 1.0~1.8倍性交快感
