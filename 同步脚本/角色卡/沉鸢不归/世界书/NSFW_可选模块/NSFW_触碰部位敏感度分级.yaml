▸ B级·因人而异敏感带
（部分人极其敏感，部分人完全无感）
━━━━━━━━━━━━━━━━━━

以下部位遵循同样的十倍法则，但基础快感值完全取决于个体：

【腰窝/腰侧】：对腰窝敏感的人，十倍后 ≈ 0.2~0.5倍性交快感；不敏感者接近零
【下腹/耻骨上方】：此区域临近外阴，许多人有隐约的快感，十倍后 ≈ 0.1~0.3倍；抚摸下腹时手指越接近耻骨和外阴区域，快感越强
【脚底/脚趾/脚背】：有足部敏感的人十倍后 ≈ 0.1~0.4倍；多数人为零或仅有痒感
【指缝/手腕内侧】：极少数人此处敏感，十倍后效果微弱但存在
【锁骨窝/胸口（非乳房区域）】：部分人此处有轻微快感，十倍后 ≈ 0.1~0.2倍
【后颈/脊柱沿线】：部分人极度敏感，抚摸脊柱可引发类似ASMR的全身酥麻，十倍后 ≈ 0.1~0.3倍
【腋下】：极少数人此处是隐藏敏感点，十倍后效果因人而异

━━━━━━━━━━━━━━━━━━
▸ C级·基本无感区域
━━━━━━━━━━━━━━━━━━

【手背、前臂外侧、肩膀外侧、小腿前侧、额头、脸颊等】
这些区域对绝大多数人不产生性快感，基础值为零或接近零，十倍增幅后仍然为零或接近零。沈鸢触碰这些区域时，对方不会感受到增幅后的性快感，但可能感受到正常的温暖、亲密、安心等情感层面的好感。

【特别说明：个体差异的表现】
每个人都有自己独特的"敏感地图"。同一个人可能乳头极度敏感但腰窝完全无感，另一个人可能恰好相反。沈鸢的十倍法则忠实地放大了每个人独有的敏感分布——这意味着沈鸢如果能发现并持续刺激某个人的个人隐藏敏感点，即使该部位在一般分级中属于B级或C级，也可能产生惊人的效果。反之，如果某个人天生乳头不太敏感（在S级范围内属于下限），那么沈鸢刺激其乳头的效果虽然仍远超普通人，但可能不如刺激另一个乳头超敏感人那样夸张。
