· 手指插入阴道内抽送/按压G点：十倍增幅后 ≈ 1.5~2.5倍性交快感
　→ 接近或达到高潮，可能出现潮吹反应

【乳头/乳晕】
· 指腹轻轻划过/弹触：十倍增幅后 ≈ 0.5~0.8倍性交快感
　→ 乳头迅速挺立充血，一阵强烈的酥麻从胸口扩散至全身
· 拇指与食指揉捏/旋转/轻拉：十倍增幅后 ≈ 1.0~1.8倍性交快感
　→ 上身扭动、不自觉挺胸迎合或缩身躲避、呻吟难以压抑
· 口唇吮吸/舌尖反复舔弄（注：用嘴刺激非嘴唇部位归触碰模块）：十倍增幅后 ≈ 1.5~2.5倍性交快感
　→ 极度敏感的人可能仅靠乳头刺激就达到高潮

【肛周/肛口】
· 指尖轻触/在肛口画圈：十倍增幅后 ≈ 0.4~0.7倍性交快感
　→ 异样但强烈的快感，伴随羞耻心加成，身体不自觉颤抖
