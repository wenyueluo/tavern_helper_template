【身体触碰特化快感增幅——单向取悦模块·总则】

【触发条件】
沈鸢身体的任何部位（手指、手掌、嘴唇、舌头、脚趾等一切体表）接触目标的身体。

【增幅方向】
严格单向增幅——仅增幅对方从该触碰中感受到的快感。沈鸢本人从触碰中获得的触感为完全正常的人类水平，不会被增幅。

【核心量化法则——十倍法则】
这是触碰模块最核心的规则，表述如下：

对方从沈鸢触碰中感受到的快感 = 从一个普通人以完全相同的方式、相同的力度、相同的部位、相同的时长进行触碰时所感受到的快感 × 10

即：增幅倍率恒定为十倍，作用于"基础快感值"之上。基础快感值由【被触碰的部位】×【触碰的方式】×【该女性个体对该部位的天生敏感程度】三个因素共同决定。

【关键推论——零基础则零增幅】
如果某个部位被触碰时本身就不产生任何快感（基础快感值为零），则十倍增幅后仍为零。例如：普通人摸一个人的手背、额头、肩膀外侧等非敏感区域，不会产生任何性快感，那么沈鸢摸这些部位同样不会凭空创造性快感。但注意：即使是非敏感区域，沈鸢的触碰仍可能带来异常舒适的温暖感、安心感等非性质的好感体验（这属于心理层面而非神经增幅层面）。

【何为"基础快感值"——详解】
基础快感值并非一个固定数值，它是一个动态的、因人而异的变量，由以下三个维度共同决定：

维度一·部位固有敏感度：人体不同部位的神经末梢密度和类型不同，产生的快感强度天然不同。阴蒂的神经末梢密度远高于手臂，因此被触碰时的基础快感天然更高。

维度二·个体差异：同一个部位，不同人的敏感程度可能天差地别。有的人乳头极度敏感，轻触就有强烈反应；有的人乳头相对不敏感，需要较重的刺激才有感觉。有的人腰窝是超级敏感区，有的人完全无感。十倍法则忠实地放大了这种个体差异——敏感的人被触碰后获得的基础快感高，十倍后效果更惊人；不敏感的人基础快感低，十倍后效果也相对温和。

维度三·触碰方式：同一个部位，不同的触碰方式产生的基础快感不同。轻轻滑过和用力揉捏显然不是同一回事。（详见触碰方式影响条目）

【快感量化参考框架】
为了让描写有据可依，以下建立一个参考框架。以"该角色与一个技术普通的男性进行标准性交（无前戏直接插入、中等速度抽送）时所感受到的整体快感"为1.0基准单位。触碰模块的十倍增幅后，各部位/方式组合产生的快感可以用这个基准来对比参照（详见部位分级条目）。

需要强调：这个量化框架是参考性的，不是精确计算公式。实际描写中应优先追求感官体验的生动表达，数值仅用于帮助判断"大致该有多强烈的反应"。
