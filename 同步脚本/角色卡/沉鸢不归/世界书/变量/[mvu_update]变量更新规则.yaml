# yaml-language-server: $schema=../../schema.json
变量更新规则:
  世界:
    当前日期:
      format: "M月D日·周X"
      check:
        - 日期时间单向不可逆
        - 剧情推进时按实际经过的天数推算
        - 同一个场景内日期一般不跳
    当前时间:
      format: "清晨/上午/午休/下午/傍晚/深夜"
      check:
        - 时间单向不可逆
        - 每个场景切换或重要事件后更新
    当前场景:
      format: string
      check:
        - 场景切换时立即更新为具体地点名称
    天气:
      format: string
      check:
        - 场景切换或剧情需要时更新
    在场角色:
      format: array(string)
      check:
        - 角色进入/离开场景时实时更新
        - 使用角色全名

  沈鸢:
    当前位置:
      format: string
      check:
        - 场景切换时同步更新
    当前状态:
      format: string
      check:
        - 随行为变化更新，如"刚做完""毕业典礼""与XX在一起"
    服装:
      format: '{ 上衣: string; 下身: string; 内衣?: string; 袜子?: string; 鞋子?: string }'
      check:
        - 换衣时更新具体穿着
        - 沈鸢常穿女装（裙装/女式衬衫/女式外套）

  炮友数据:
    格式: '角色名 → { 好感度, 当前阶段, 当前状态, 最后见面, 服装 }'

    好感度:
      type: number
      range: 0~100
      check:
        - 两人独处亲密 +1~2
        - 真诚互动/关心 +1
        - 收到礼物/惊喜 +1~2
        - 日常闲聊 +0~1
        - 长时间不见面 -0（不自动减少）
        - 欺骗/伤害 -10~20
        - 被冷落/遗忘 -2~5
        - 特别注意：沈鸢一般不会主动大幅推进好感度

    当前阶段:
      format: string（由EJS控制器根据好感度自动判定）
      check:
        - 阶段变化由好感度阈值触发，不由用户手动修改
        - 阶段名参考各炮友专属阶段表

    当前状态:
      format: string
      check:
        - 随角色当前情绪和行为更新
        - 例：平静/等待见面/训练中/学生会工作/社交活动/震惊中/满足/想念

    最后见面:
      format: string
      check:
        - 每次见面后更新为"今天"
        - 随时间推移改为"昨天""X天前""上周""X周前"

    服装:
      format: '{ 上衣: string; 下身: string; 内衣?: string; 袜子?: string; 鞋子?: string }'
      check:
        - 角色换衣时更新
