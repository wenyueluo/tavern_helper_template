备注: |
  # 月与日与橘与雨
  # 四人意象：月=月岛悠（孤岛之月）；日=朝日向七海（不完美的太阳）；橘=橘澪（常绿之树）；雨=月见里雫（水=雨天的觉醒）
  # 日式校园·四角恋·青春物哀·救赎与治愈
  # 三段式：颓废→短暂救赎→二次沉沦→终极治愈
  # 朝日向七海有白骑士综合征——拯救别人确认自我价值，被拯救者康复后抽身离开。橘澪打断让她无法完成白骑士循环，月见里雫的纯白和橘澪的爱上月岛悠让她认清：不是拯救，是想留下。
